<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taste Skill Type</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07080d;
      --bg-soft: #0b0f16;
      --panel: rgba(16, 21, 30, 0.9);
      --panel-strong: rgba(20, 27, 38, 0.96);
      --line: rgba(218, 226, 242, 0.14);
      --line-strong: rgba(107, 226, 202, 0.5);
      --text: #f2f5f0;
      --text-soft: #b9c2c9;
      --muted: #778390;
      --faint: #4e5865;
      --cyan: #68e7d1;
      --mint: #79e69b;
      --rose: #ff667a;
      --amber: #f8c861;
      --violet: #a99bff;
      --steel: #7fb5ff;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
      --radius: 8px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      margin: 0;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 22%),
        linear-gradient(135deg, #07080d 0%, #10151e 48%, #0a0d12 100%);
      color: var(--text);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.86), transparent 80%);
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(104, 231, 209, 0.09), transparent 28%, transparent 72%, rgba(255, 102, 122, 0.08)),
        linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      display: grid;
      width: min(1180px, calc(100% - 32px));
      min-height: 100dvh;
      margin: 0 auto;
      padding: 18px 0;
      gap: 16px;
      grid-template-rows: auto auto minmax(0, 1fr);
      animation: app-enter 460ms ease both;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(104, 231, 209, 0.5);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(104, 231, 209, 0.18), rgba(169, 155, 255, 0.16)),
        rgba(255, 255, 255, 0.04);
      box-shadow: 0 18px 48px rgba(104, 231, 209, 0.1);
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.62rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .timer-modes {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .mode-button,
    .ghost-button,
    .primary-button {
      min-height: 40px;
      border-radius: var(--radius);
      transition:
        transform 160ms ease,
        border-color 160ms ease,
        background 160ms ease,
        color 160ms ease;
    }

    .mode-button {
      min-width: 62px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      color: var(--text-soft);
      font-weight: 700;
    }

    .mode-button:hover,
    .mode-button:focus-visible,
    .ghost-button:hover,
    .ghost-button:focus-visible,
    .primary-button:hover,
    .primary-button:focus-visible {
      transform: translateY(-1px);
      outline: 0;
    }

    .mode-button.is-active {
      border-color: var(--line-strong);
      background: rgba(104, 231, 209, 0.14);
      color: var(--cyan);
    }

    .custom-mode {
      display: flex;
      align-items: center;
      height: 40px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      transition: border-color 160ms ease, background 160ms ease;
    }

    .custom-mode.is-active,
    .custom-mode:focus-within {
      border-color: rgba(248, 200, 97, 0.58);
      background: rgba(248, 200, 97, 0.1);
    }

    .custom-mode span {
      padding: 0 10px 0 12px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 760;
    }

    .custom-mode input {
      width: 78px;
      height: 100%;
      border: 0;
      border-left: 1px solid var(--line);
      outline: 0;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      text-align: center;
      font-family: var(--mono);
      font-size: 0.95rem;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.015)),
        var(--panel);
      box-shadow: 0 18px 58px rgba(0, 0, 0, 0.26);
    }

    .metric-label {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric-value {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0;
    }

    .metric:nth-child(1) .metric-value {
      color: var(--cyan);
    }

    .metric:nth-child(2) .metric-value {
      color: var(--steel);
    }

    .metric:nth-child(3) .metric-value {
      color: var(--mint);
    }

    .metric:nth-child(4) .metric-value {
      color: var(--amber);
    }

    .main-grid {
      display: grid;
      min-height: 0;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 16px;
      align-items: stretch;
    }

    .typing-stage,
    .history-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.018)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px) saturate(1.12);
    }

    .typing-stage {
      display: grid;
      min-height: min(580px, calc(100dvh - 210px));
      overflow: hidden;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .stage-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(104, 231, 209, 0.25);
      border-radius: var(--radius);
      background: rgba(104, 231, 209, 0.08);
      color: var(--cyan);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .progress-shell {
      position: relative;
      width: min(280px, 42vw);
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--amber), var(--rose));
      transition: width 120ms linear;
    }

    .passage-wrap {
      display: flex;
      min-height: 0;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding: clamp(18px, 4vw, 34px);
      cursor: text;
    }

    .passage {
      min-height: 190px;
      color: var(--text-soft);
      font-family: var(--mono);
      font-size: clamp(1.15rem, 2.8vw, 1.85rem);
      font-weight: 650;
      line-height: 1.72;
      letter-spacing: 0;
      text-wrap: pretty;
    }

    .word {
      display: inline;
      border-radius: 5px;
      transition: background 140ms ease, box-shadow 140ms ease;
    }

    .word.current {
      background: rgba(248, 200, 97, 0.12);
      box-shadow: 0 0 0 3px rgba(248, 200, 97, 0.12);
    }

    .char {
      position: relative;
      display: inline;
      min-width: 0.6ch;
      border-radius: 3px;
      transition:
        color 100ms ease,
        background 100ms ease,
        opacity 100ms ease;
    }

    .char.correct {
      color: var(--mint);
    }

    .char.incorrect {
      color: var(--rose);
      background: rgba(255, 102, 122, 0.13);
    }

    .char.pending {
      color: rgba(219, 227, 235, 0.64);
    }

    .char.next-char::after {
      position: absolute;
      left: -1px;
      top: 8%;
      width: 2px;
      height: 84%;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(104, 231, 209, 0.85);
      content: "";
      animation: caret-pulse 900ms ease-in-out infinite;
    }

    .typing-input {
      width: 100%;
      min-height: 70px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      background: rgba(3, 5, 8, 0.58);
      color: var(--text);
      caret-color: var(--cyan);
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 1rem;
      line-height: 1.45;
      letter-spacing: 0;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .typing-input:focus {
      border-color: rgba(104, 231, 209, 0.58);
      background: rgba(3, 5, 8, 0.76);
      box-shadow:
        0 0 0 3px rgba(104, 231, 209, 0.11),
        0 18px 48px rgba(0, 0, 0, 0.24);
    }

    .stage-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 16px;
      border-top: 1px solid var(--line);
    }

    .micro-stats {
      display: flex;
      min-width: 0;
      gap: 12px;
      color: var(--muted);
      font-size: 0.86rem;
      flex-wrap: wrap;
    }

    .micro-stats strong {
      color: var(--text-soft);
      font-family: var(--mono);
    }

    .ghost-button,
    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 112px;
      padding: 0 14px;
      font-weight: 800;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-soft);
    }

    .ghost-button:hover,
    .ghost-button:focus-visible {
      border-color: rgba(127, 181, 255, 0.5);
      color: var(--steel);
    }

    .primary-button {
      border: 1px solid rgba(104, 231, 209, 0.56);
      background: linear-gradient(135deg, rgba(104, 231, 209, 0.28), rgba(121, 230, 155, 0.16));
      color: var(--text);
      box-shadow: 0 18px 42px rgba(104, 231, 209, 0.1);
    }

    .history-panel {
      display: grid;
      min-height: 360px;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .history-head h2,
    .result-card h2 {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .history-head span {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    .history-chart {
      display: flex;
      align-items: end;
      gap: 8px;
      min-height: 220px;
      padding: 22px 16px 18px;
    }

    .history-empty {
      align-self: center;
      width: 100%;
      color: var(--muted);
      text-align: center;
      font-size: 0.94rem;
    }

    .history-bar {
      position: relative;
      display: flex;
      min-width: 0;
      flex: 1;
      align-items: end;
      justify-content: center;
      height: var(--bar-height);
      min-height: 14px;
      border: 1px solid rgba(104, 231, 209, 0.28);
      border-radius: 6px 6px 3px 3px;
      background:
        linear-gradient(180deg, rgba(104, 231, 209, 0.72), rgba(127, 181, 255, 0.42)),
        rgba(255, 255, 255, 0.06);
      box-shadow: 0 12px 34px rgba(104, 231, 209, 0.11);
      animation: bar-rise 360ms ease both;
    }

    .history-bar span {
      position: absolute;
      bottom: calc(100% + 7px);
      color: var(--text-soft);
      font-family: var(--mono);
      font-size: 0.74rem;
      font-weight: 800;
    }

    .history-foot {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      border-top: 1px solid var(--line);
      background: var(--line);
    }

    .history-foot div {
      min-width: 0;
      padding: 12px;
      background: rgba(7, 10, 15, 0.7);
    }

    .history-foot span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .history-foot strong {
      display: block;
      margin-top: 4px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
    }

    .results {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 8, 0.74);
      opacity: 0;
      backdrop-filter: blur(14px);
      transition: opacity 180ms ease;
    }

    .results[hidden] {
      display: none;
    }

    .results.is-open {
      opacity: 1;
    }

    .result-card {
      width: min(620px, 100%);
      border: 1px solid rgba(218, 226, 242, 0.18);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025)),
        #10151e;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      transform: translateY(10px) scale(0.985);
      transition: transform 180ms ease;
      overflow: hidden;
    }

    .results.is-open .result-card {
      transform: translateY(0) scale(1);
    }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .result-top p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
    }

    .result-stat {
      min-width: 0;
      padding: 18px 14px;
      background: rgba(9, 13, 19, 0.94);
    }

    .result-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .result-stat strong {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-family: var(--mono);
      font-size: clamp(1.28rem, 5vw, 2rem);
      line-height: 1;
    }

    .result-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 18px 18px;
    }

    @keyframes app-enter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes caret-pulse {
      0%,
      100% {
        opacity: 0.25;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes bar-rise {
      from {
        height: 10px;
        opacity: 0.35;
      }
      to {
        height: var(--bar-height);
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 920px) {
      .app {
        width: min(100% - 24px, 720px);
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .timer-modes {
        justify-content: flex-start;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      .typing-stage {
        min-height: 0;
      }

      .history-panel {
        min-height: 320px;
      }
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 20px, 540px);
        padding: 12px 0;
        gap: 12px;
      }

      .brand {
        align-items: flex-start;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
      }

      .brand p {
        font-size: 0.82rem;
      }

      .metric-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric {
        padding: 12px;
      }

      .stage-header,
      .stage-footer,
      .result-top,
      .result-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .progress-shell {
        width: 100%;
      }

      .passage-wrap {
        padding: 18px 14px;
      }

      .passage {
        min-height: 150px;
        font-size: clamp(1rem, 5vw, 1.35rem);
        line-height: 1.66;
      }

      .typing-input {
        min-height: 86px;
        font-size: 16px;
      }

      .ghost-button,
      .primary-button {
        width: 100%;
      }

      .result-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Typing speed test">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">TS</div>
        <div>
          <h1>Taste Skill Type</h1>
          <p>Precision, pace, and clean repetition.</p>
        </div>
      </div>

      <div class="timer-modes" role="group" aria-label="Timer mode">
        <button class="mode-button" type="button" data-duration="30">30s</button>
        <button class="mode-button is-active" type="button" data-duration="60">60s</button>
        <button class="mode-button" type="button" data-duration="120">120s</button>
        <label class="custom-mode" id="customMode">
          <span>Custom</span>
          <input id="customSeconds" type="number" min="10" max="300" step="5" value="90" inputmode="numeric" aria-label="Custom seconds">
        </label>
      </div>
    </header>

    <section class="metric-strip" aria-label="Live typing stats">
      <div class="metric">
        <span class="metric-label">WPM</span>
        <strong class="metric-value" id="liveWpm">0</strong>
      </div>
      <div class="metric">
        <span class="metric-label">CPM</span>
        <strong class="metric-value" id="liveCpm">0</strong>
      </div>
      <div class="metric">
        <span class="metric-label">Accuracy</span>
        <strong class="metric-value" id="liveAccuracy">100%</strong>
      </div>
      <div class="metric">
        <span class="metric-label">Time</span>
        <strong class="metric-value" id="liveTime">1:00</strong>
      </div>
    </section>

    <section class="main-grid">
      <section class="typing-stage" aria-label="Typing round">
        <div class="stage-header">
          <span class="status-chip" id="statusText" aria-live="polite">Ready</span>
          <div class="progress-shell" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="passage-wrap" id="passageWrap">
          <div class="passage" id="passageDisplay" aria-live="off"></div>
          <label class="sr-only" for="typingInput">Typing input</label>
          <textarea class="typing-input" id="typingInput" spellcheck="false" autocomplete="off" autocapitalize="none" rows="3"></textarea>
        </div>

        <div class="stage-footer">
          <div class="micro-stats" aria-label="Round details">
            <span>Chars <strong id="charCount">0</strong></span>
            <span>Errors <strong id="errorCount">0</strong></span>
            <span>Consistency <strong id="liveConsistency">0%</strong></span>
          </div>
          <button class="ghost-button" type="button" id="newRoundButton">New Round</button>
        </div>
      </section>

      <aside class="history-panel" aria-label="Typing history">
        <div class="history-head">
          <h2>Last 10</h2>
          <span id="historyCount">0 saved</span>
        </div>
        <div class="history-chart" id="historyChart"></div>
        <div class="history-foot">
          <div>
            <span>Best</span>
            <strong id="historyBest">0</strong>
          </div>
          <div>
            <span>Average</span>
            <strong id="historyAverage">0</strong>
          </div>
          <div>
            <span>Recent</span>
            <strong id="historyRecent">0</strong>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <section class="results" id="resultsScreen" hidden aria-label="Round results" role="dialog" aria-modal="true">
    <div class="result-card">
      <div class="result-top">
        <div>
          <h2 id="resultTitle">Round Complete</h2>
          <p id="resultMeta">Stored in local history.</p>
        </div>
        <button class="ghost-button" type="button" id="closeResultsButton">Close</button>
      </div>

      <div class="result-grid">
        <div class="result-stat">
          <span>WPM</span>
          <strong id="resultWpm">0</strong>
        </div>
        <div class="result-stat">
          <span>Accuracy</span>
          <strong id="resultAccuracy">100%</strong>
        </div>
        <div class="result-stat">
          <span>Raw CPM</span>
          <strong id="resultCpm">0</strong>
        </div>
        <div class="result-stat">
          <span>Consistency</span>
          <strong id="resultConsistency">0%</strong>
        </div>
      </div>

      <div class="result-actions">
        <button class="primary-button" type="button" id="tryAgainButton">Try Again</button>
      </div>
    </div>
  </section>

  <script>
    (() => {
      'use strict';

      // BEGIN TYPE_CORE
      const TypeCore = (() => {
        const clamp = (value, min, max) => Math.min(Math.max(value, min), max);

        function countCorrectChars(target, typed) {
          const limit = Math.min(target.length, typed.length);
          let correct = 0;

          for (let index = 0; index < limit; index += 1) {
            if (typed[index] === target[index]) {
              correct += 1;
            }
          }

          return correct;
        }

        function calculateConsistency(samples) {
          if (!Array.isArray(samples) || samples.length < 2) {
            return 0;
          }

          const speeds = [];

          for (let index = 1; index < samples.length; index += 1) {
            const previous = samples[index - 1];
            const current = samples[index];
            const elapsedMinutes = (current.elapsedMs - previous.elapsedMs) / 60000;
            const typedDelta = current.typedLength - previous.typedLength;

            if (elapsedMinutes > 0 && typedDelta >= 0) {
              speeds.push((typedDelta / 5) / elapsedMinutes);
            }
          }

          if (speeds.length < 2) {
            return speeds.length === 1 && speeds[0] > 0 ? 100 : 0;
          }

          const average = speeds.reduce((sum, speed) => sum + speed, 0) / speeds.length;

          if (average <= 0) {
            return 0;
          }

          const variance = speeds.reduce((sum, speed) => sum + ((speed - average) ** 2), 0) / speeds.length;
          const coefficient = Math.sqrt(variance) / average;

          return Math.round(clamp(100 - (coefficient * 100), 0, 100));
        }

        function calculateStats({ target, typed, elapsedMs, samples }) {
          const targetText = String(target || '');
          const typedText = String(typed || '');
          const typedChars = typedText.length;
          const correctChars = countCorrectChars(targetText, typedText);
          const safeElapsedMs = Math.max(Number(elapsedMs) || 0, 1000);
          const elapsedMinutes = safeElapsedMs / 60000;

          return {
            typedChars,
            correctChars,
            errors: Math.max(typedChars - correctChars, 0),
            wpm: Math.round((correctChars / 5) / elapsedMinutes),
            rawCpm: Math.round(typedChars / elapsedMinutes),
            accuracy: typedChars === 0 ? 100 : Math.round((correctChars / typedChars) * 100),
            consistency: calculateConsistency(samples || [])
          };
        }

        function getWordRanges(text) {
          const ranges = [];
          const matcher = /\S+/g;
          let match = matcher.exec(text);

          while (match) {
            ranges.push({
              start: match.index,
              end: match.index + match[0].length
            });
            match = matcher.exec(text);
          }

          return ranges;
        }

        function getCurrentWordIndex(text, typedLength) {
          const ranges = getWordRanges(text);

          if (ranges.length === 0) {
            return -1;
          }

          if (typedLength >= text.length) {
            return ranges.length - 1;
          }

          for (let index = 0; index < ranges.length; index += 1) {
            const range = ranges[index];

            if (typedLength < range.start || typedLength <= range.end) {
              return index;
            }
          }

          return ranges.length - 1;
        }

        function createCharacterStates(target, typed) {
          const targetText = String(target || '');
          const typedText = String(typed || '');
          const ranges = getWordRanges(targetText);
          const currentWordIndex = getCurrentWordIndex(targetText, typedText.length);
          const wordByChar = Array(targetText.length).fill(-1);

          ranges.forEach((range, wordIndex) => {
            for (let index = range.start; index < range.end; index += 1) {
              wordByChar[index] = wordIndex;
            }
          });

          return Array.from(targetText).map((char, index) => {
            const isTyped = index < typedText.length;
            const wordIndex = wordByChar[index];

            return {
              char,
              status: isTyped ? (typedText[index] === char ? 'correct' : 'incorrect') : 'pending',
              currentWord: wordIndex === currentWordIndex,
              isSpace: /\s/.test(char),
              wordIndex
            };
          });
        }

        function trimHistory(history, limit = 10) {
          return Array.isArray(history) ? history.slice(-limit) : [];
        }

        return {
          calculateStats,
          createCharacterStates,
          trimHistory
        };
      })();
      // END TYPE_CORE

      window.TypeCore = TypeCore;

      const HISTORY_KEY = 'taste-skill-type-history-v1';
      const MIN_CUSTOM_SECONDS = 10;
      const MAX_CUSTOM_SECONDS = 300;

      const passages = [
        'Skill is built in quiet repetitions, where small corrections become automatic and attention learns to stay calm under pressure.',
        'Good taste is not decoration. It is the habit of removing noise until the useful thing can breathe on its own.',
        'A fast typist does not chase every key. The hands stay loose, the eyes move ahead, and the next word arrives early.',
        'Sharp tools reward patience. Measure once, adjust the angle, and let each deliberate motion compound into confidence.',
        'The best interface disappears during use. It gives the hand a clear path, keeps the mind in flow, and never asks for ceremony.',
        'Practice turns scattered effort into rhythm. The first minute feels mechanical, then the pattern settles and the work gets lighter.',
        'Accuracy creates speed because every correction has a cost. Clean input keeps momentum alive and makes the final number honest.',
        'Craft lives in the last five percent: balanced spacing, restrained color, readable contrast, and motion that has a reason.'
      ];

      const elements = {
        durationButtons: Array.from(document.querySelectorAll('[data-duration]')),
        customMode: document.getElementById('customMode'),
        customSeconds: document.getElementById('customSeconds'),
        liveWpm: document.getElementById('liveWpm'),
        liveCpm: document.getElementById('liveCpm'),
        liveAccuracy: document.getElementById('liveAccuracy'),
        liveTime: document.getElementById('liveTime'),
        statusText: document.getElementById('statusText'),
        progressFill: document.getElementById('progressFill'),
        passageWrap: document.getElementById('passageWrap'),
        passageDisplay: document.getElementById('passageDisplay'),
        typingInput: document.getElementById('typingInput'),
        charCount: document.getElementById('charCount'),
        errorCount: document.getElementById('errorCount'),
        liveConsistency: document.getElementById('liveConsistency'),
        newRoundButton: document.getElementById('newRoundButton'),
        historyChart: document.getElementById('historyChart'),
        historyCount: document.getElementById('historyCount'),
        historyBest: document.getElementById('historyBest'),
        historyAverage: document.getElementById('historyAverage'),
        historyRecent: document.getElementById('historyRecent'),
        resultsScreen: document.getElementById('resultsScreen'),
        resultTitle: document.getElementById('resultTitle'),
        resultMeta: document.getElementById('resultMeta'),
        resultWpm: document.getElementById('resultWpm'),
        resultAccuracy: document.getElementById('resultAccuracy'),
        resultCpm: document.getElementById('resultCpm'),
        resultConsistency: document.getElementById('resultConsistency'),
        closeResultsButton: document.getElementById('closeResultsButton'),
        tryAgainButton: document.getElementById('tryAgainButton')
      };

      const state = {
        durationSeconds: 60,
        activeMode: '60',
        passageIndex: -1,
        passage: '',
        started: false,
        complete: false,
        startTime: 0,
        elapsedMs: 0,
        timerId: 0,
        lastSampleAt: 0,
        samples: [{ elapsedMs: 0, typedLength: 0 }],
        history: loadHistory()
      };

      function loadHistory() {
        try {
          const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
          const usable = Array.isArray(parsed)
            ? parsed.filter((item) => Number.isFinite(item.wpm) && Number.isFinite(item.accuracy))
            : [];

          return TypeCore.trimHistory(usable);
        } catch (error) {
          return [];
        }
      }

      function saveHistory() {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(state.history));
      }

      function formatTime(ms) {
        const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;

        return `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      function getElapsedMs(now = performance.now()) {
        if (!state.started) {
          return state.elapsedMs;
        }

        return Math.min(now - state.startTime, state.durationSeconds * 1000);
      }

      function getSamplesWithCurrent(elapsedMs = getElapsedMs()) {
        const current = {
          elapsedMs: Math.round(elapsedMs),
          typedLength: elements.typingInput.value.length
        };
        const last = state.samples[state.samples.length - 1];

        if (last && last.elapsedMs === current.elapsedMs && last.typedLength === current.typedLength) {
          return state.samples;
        }

        return state.samples.concat(current);
      }

      function getCurrentStats(elapsedMs = getElapsedMs()) {
        return TypeCore.calculateStats({
          target: state.passage,
          typed: elements.typingInput.value,
          elapsedMs,
          samples: getSamplesWithCurrent(elapsedMs)
        });
      }

      function pickPassage() {
        if (passages.length === 1) {
          state.passageIndex = 0;
          return passages[0];
        }

        let nextIndex = Math.floor(Math.random() * passages.length);

        while (nextIndex === state.passageIndex) {
          nextIndex = Math.floor(Math.random() * passages.length);
        }

        state.passageIndex = nextIndex;
        return passages[nextIndex];
      }

      function renderPassage() {
        const states = TypeCore.createCharacterStates(state.passage, elements.typingInput.value);
        const fragment = document.createDocumentFragment();
        let index = 0;

        while (index < states.length) {
          const stateForChar = states[index];

          if (stateForChar.isSpace) {
            fragment.appendChild(createCharSpan(stateForChar, index));
            index += 1;
            continue;
          }

          const word = document.createElement('span');
          word.className = stateForChar.currentWord ? 'word current' : 'word';

          while (index < states.length && !states[index].isSpace) {
            word.appendChild(createCharSpan(states[index], index));
            index += 1;
          }

          fragment.appendChild(word);
        }

        elements.passageDisplay.replaceChildren(fragment);
      }

      function createCharSpan(characterState, index) {
        const span = document.createElement('span');
        const isNext = index === elements.typingInput.value.length && !state.complete;
        span.className = `char ${characterState.status}${isNext ? ' next-char' : ''}`;
        span.textContent = characterState.isSpace ? '\u00a0' : characterState.char;
        return span;
      }

      function renderLiveStats() {
        const elapsedMs = getElapsedMs();
        const stats = getCurrentStats(elapsedMs);
        const durationMs = state.durationSeconds * 1000;
        const remainingMs = state.started ? durationMs - elapsedMs : durationMs;
        const progress = durationMs === 0 ? 0 : Math.min(100, (elapsedMs / durationMs) * 100);

        elements.liveWpm.textContent = stats.wpm;
        elements.liveCpm.textContent = stats.rawCpm;
        elements.liveAccuracy.textContent = `${stats.accuracy}%`;
        elements.liveTime.textContent = formatTime(remainingMs);
        elements.charCount.textContent = stats.typedChars;
        elements.errorCount.textContent = stats.errors;
        elements.liveConsistency.textContent = `${stats.consistency}%`;
        elements.progressFill.style.width = `${progress}%`;
      }

      function renderHistory() {
        const history = state.history;
        elements.historyChart.replaceChildren();
        elements.historyCount.textContent = `${history.length} saved`;

        if (history.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'history-empty';
          empty.textContent = 'No saved rounds';
          elements.historyChart.appendChild(empty);
          elements.historyBest.textContent = '0';
          elements.historyAverage.textContent = '0';
          elements.historyRecent.textContent = '0';
          return;
        }

        const maxWpm = Math.max(...history.map((item) => item.wpm), 1);
        const best = Math.max(...history.map((item) => item.wpm));
        const average = Math.round(history.reduce((sum, item) => sum + item.wpm, 0) / history.length);
        const recent = history[history.length - 1].wpm;

        history.forEach((item, index) => {
          const bar = document.createElement('div');
          const height = Math.max(10, Math.round((item.wpm / maxWpm) * 100));
          const label = document.createElement('span');
          bar.className = 'history-bar';
          bar.style.setProperty('--bar-height', `${height}%`);
          bar.style.animationDelay = `${index * 24}ms`;
          bar.title = `${item.wpm} WPM, ${item.accuracy}% accuracy`;
          label.textContent = item.wpm;
          bar.appendChild(label);
          elements.historyChart.appendChild(bar);
        });

        elements.historyBest.textContent = best;
        elements.historyAverage.textContent = average;
        elements.historyRecent.textContent = recent;
      }

      function setDuration(seconds, mode) {
        const safeSeconds = Math.round(Math.min(Math.max(seconds, MIN_CUSTOM_SECONDS), MAX_CUSTOM_SECONDS));
        state.durationSeconds = safeSeconds;
        state.activeMode = mode;

        elements.durationButtons.forEach((button) => {
          button.classList.toggle('is-active', button.dataset.duration === mode);
        });
        elements.customMode.classList.toggle('is-active', mode === 'custom');
        renderLiveStats();
      }

      function startTimer() {
        state.started = true;
        state.startTime = performance.now();
        state.lastSampleAt = 0;
        state.samples = [{ elapsedMs: 0, typedLength: 0 }];
        elements.statusText.textContent = 'Running';

        clearInterval(state.timerId);
        state.timerId = window.setInterval(tick, 100);
      }

      function sampleProgress(elapsedMs) {
        if (elapsedMs - state.lastSampleAt < 1000) {
          return;
        }

        state.samples.push({
          elapsedMs: Math.round(elapsedMs),
          typedLength: elements.typingInput.value.length
        });
        state.lastSampleAt = elapsedMs;
      }

      function tick() {
        if (state.complete) {
          return;
        }

        const elapsedMs = getElapsedMs();
        sampleProgress(elapsedMs);
        renderLiveStats();

        if (elapsedMs >= state.durationSeconds * 1000) {
          finishRound('time');
        }
      }

      function finishRound(reason) {
        if (state.complete) {
          return;
        }

        const elapsedMs = reason === 'time' ? state.durationSeconds * 1000 : getElapsedMs();
        state.complete = true;
        state.elapsedMs = elapsedMs;
        clearInterval(state.timerId);
        state.samples = getSamplesWithCurrent(elapsedMs);
        elements.statusText.textContent = 'Complete';
        renderPassage();
        renderLiveStats();

        const stats = getCurrentStats(elapsedMs);
        const result = {
          id: Date.now(),
          at: new Date().toISOString(),
          duration: state.durationSeconds,
          reason,
          wpm: stats.wpm,
          accuracy: stats.accuracy,
          rawCpm: stats.rawCpm,
          consistency: stats.consistency,
          typedChars: stats.typedChars,
          errors: stats.errors
        };

        state.history = TypeCore.trimHistory(state.history.concat(result));
        saveHistory();
        renderHistory();
        showResults(result);
      }

      function showResults(result) {
        elements.resultTitle.textContent = result.reason === 'time' ? 'Time Complete' : 'Passage Complete';
        elements.resultMeta.textContent = `${result.duration}s round, ${result.typedChars} chars, ${result.errors} errors`;
        elements.resultWpm.textContent = result.wpm;
        elements.resultAccuracy.textContent = `${result.accuracy}%`;
        elements.resultCpm.textContent = result.rawCpm;
        elements.resultConsistency.textContent = `${result.consistency}%`;
        elements.resultsScreen.hidden = false;

        requestAnimationFrame(() => {
          elements.resultsScreen.classList.add('is-open');
          elements.tryAgainButton.focus();
        });
      }

      function hideResults() {
        elements.resultsScreen.classList.remove('is-open');
        elements.resultsScreen.hidden = true;
      }

      function startNewRound() {
        clearInterval(state.timerId);
        state.passage = pickPassage();
        state.started = false;
        state.complete = false;
        state.elapsedMs = 0;
        state.lastSampleAt = 0;
        state.samples = [{ elapsedMs: 0, typedLength: 0 }];

        hideResults();
        elements.typingInput.value = '';
        elements.typingInput.maxLength = state.passage.length;
        elements.statusText.textContent = 'Ready';
        renderPassage();
        renderLiveStats();
        window.setTimeout(() => elements.typingInput.focus(), 30);
      }

      function normalizeTypedValue() {
        const normalized = elements.typingInput.value.replace(/\n/g, ' ');

        if (normalized !== elements.typingInput.value) {
          const cursor = elements.typingInput.selectionStart;
          elements.typingInput.value = normalized;
          elements.typingInput.selectionStart = cursor;
          elements.typingInput.selectionEnd = cursor;
        }
      }

      function handleTypingInput() {
        if (state.complete) {
          return;
        }

        normalizeTypedValue();

        if (!state.started && elements.typingInput.value.length > 0) {
          startTimer();
        }

        renderPassage();
        renderLiveStats();

        if (elements.typingInput.value.length >= state.passage.length) {
          finishRound('complete');
        }
      }

      function flashStatus(message) {
        const previous = elements.statusText.textContent;
        elements.statusText.textContent = message;

        window.setTimeout(() => {
          if (!state.complete) {
            elements.statusText.textContent = state.started ? 'Running' : previous;
          }
        }, 900);
      }

      elements.durationButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setDuration(Number(button.dataset.duration), button.dataset.duration);
          startNewRound();
        });
      });

      elements.customSeconds.addEventListener('change', () => {
        const seconds = Math.round(Number(elements.customSeconds.value) || 90);
        const safeSeconds = Math.min(Math.max(seconds, MIN_CUSTOM_SECONDS), MAX_CUSTOM_SECONDS);
        elements.customSeconds.value = safeSeconds;
        setDuration(safeSeconds, 'custom');
        startNewRound();
      });

      elements.customSeconds.addEventListener('focus', () => {
        elements.customMode.classList.add('is-active');
      });

      elements.customSeconds.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          elements.customSeconds.blur();
        }
      });

      elements.typingInput.addEventListener('input', handleTypingInput);

      elements.typingInput.addEventListener('paste', (event) => {
        event.preventDefault();
        flashStatus('Paste blocked');
      });

      elements.passageWrap.addEventListener('click', (event) => {
        if (event.target !== elements.customSeconds) {
          elements.typingInput.focus();
        }
      });

      elements.newRoundButton.addEventListener('click', startNewRound);
      elements.closeResultsButton.addEventListener('click', () => {
        hideResults();
        elements.typingInput.focus();
      });
      elements.tryAgainButton.addEventListener('click', startNewRound);

      document.addEventListener('keydown', (event) => {
        const target = event.target;
        const isTypingTarget = target === elements.typingInput || target === elements.customSeconds;

        if (event.key === 'Escape') {
          event.preventDefault();
          startNewRound();
          return;
        }

        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault();
          startNewRound();
          return;
        }

        if (!isTypingTarget && event.key.length === 1 && !event.metaKey && !event.ctrlKey && !event.altKey) {
          elements.typingInput.focus();
        }
      });

      renderHistory();
      startNewRound();
    })();
  </script>
</body>
</html>
