<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050507">
  <title>Simon</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050507;
      --panel: #101016;
      --panel-2: #171724;
      --text: #f4f7ff;
      --muted: #9ca3b8;
      --line: rgba(255, 255, 255, 0.14);
      --green: #35ff8a;
      --red: #ff4f6d;
      --yellow: #ffe66d;
      --blue: #46a7ff;
      --shadow: rgba(0, 0, 0, 0.55);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100svh;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 45%, #1d1324 0%, #09090d 42%, var(--bg) 100%);
      background-size: 44px 44px, 44px 44px, auto;
      color: var(--text);
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100svh;
      padding: clamp(18px, 4vw, 44px);
      gap: clamp(14px, 2.5vw, 28px);
    }

    .topbar,
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
    }

    .title {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0;
      font-size: clamp(2.1rem, 7vw, 5.2rem);
      line-height: 0.92;
      color: #ffffff;
      text-shadow:
        0 0 10px rgba(255, 255, 255, 0.45),
        0 0 36px rgba(70, 167, 255, 0.24),
        0 0 52px rgba(255, 79, 109, 0.18);
    }

    .stage {
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 0;
    }

    .board-shell {
      position: relative;
      width: min(86vw, 68svh, 640px);
      min-width: min(86vw, 300px);
      aspect-ratio: 1;
      border-radius: 50%;
      padding: clamp(12px, 2.2vw, 22px);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.02)),
        #08080d;
      box-shadow:
        0 24px 90px var(--shadow),
        inset 0 0 0 1px rgba(255, 255, 255, 0.12),
        inset 0 0 44px rgba(255, 255, 255, 0.05);
      transition: transform 180ms ease;
    }

    .board-shell.is-missed {
      animation: miss-shake 300ms linear;
    }

    .pads {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      width: 100%;
      height: 100%;
      gap: clamp(12px, 2vw, 20px);
      border-radius: 50%;
      overflow: hidden;
    }

    .pad {
      position: relative;
      display: block;
      min-width: 0;
      min-height: 0;
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background:
        radial-gradient(circle at 36% 30%, rgba(255, 255, 255, 0.26), transparent 25%),
        linear-gradient(145deg, color-mix(in srgb, var(--pad) 30%, #111), var(--pad-dim));
      box-shadow:
        inset 0 0 28px rgba(255, 255, 255, 0.04),
        inset 0 0 58px rgba(0, 0, 0, 0.34),
        0 0 16px color-mix(in srgb, var(--pad) 26%, transparent);
      cursor: pointer;
      filter: saturate(0.72) brightness(0.84);
      outline: none;
      transform: translateZ(0);
      transition:
        filter 120ms ease,
        box-shadow 120ms ease,
        transform 120ms ease;
      touch-action: manipulation;
    }

    .pad::after {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: inherit;
      background: var(--pad);
      opacity: 0;
      filter: blur(34px);
      transition: opacity 120ms ease;
    }

    .pad:hover {
      filter: saturate(0.92) brightness(0.96);
    }

    .pad:focus-visible {
      box-shadow:
        inset 0 0 28px rgba(255, 255, 255, 0.08),
        0 0 0 4px rgba(255, 255, 255, 0.2),
        0 0 28px var(--pad);
    }

    .pad.is-lit {
      filter: saturate(1.35) brightness(1.42);
      transform: scale(0.985);
      box-shadow:
        inset 0 0 34px rgba(255, 255, 255, 0.26),
        inset 0 0 62px rgba(255, 255, 255, 0.12),
        0 0 22px color-mix(in srgb, var(--pad) 82%, transparent),
        0 0 72px color-mix(in srgb, var(--pad) 50%, transparent);
    }

    .pad.is-lit::after {
      opacity: 0.68;
    }

    .pad-green {
      --pad: var(--green);
      --pad-dim: #0e5a34;
      border-top-left-radius: 100%;
    }

    .pad-red {
      --pad: var(--red);
      --pad-dim: #611323;
      border-top-right-radius: 100%;
    }

    .pad-yellow {
      --pad: var(--yellow);
      --pad-dim: #695a14;
      border-bottom-left-radius: 100%;
    }

    .pad-blue {
      --pad: var(--blue);
      --pad-dim: #123f66;
      border-bottom-right-radius: 100%;
    }

    .hub {
      position: absolute;
      inset: 50% auto auto 50%;
      display: grid;
      grid-template-rows: auto auto auto;
      place-items: center;
      width: clamp(146px, 31%, 210px);
      aspect-ratio: 1;
      padding: clamp(16px, 3vw, 24px);
      border: 1px solid var(--line);
      border-radius: 50%;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.12), transparent 34%),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      box-shadow:
        0 18px 56px rgba(0, 0, 0, 0.58),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05),
        0 0 36px rgba(255, 255, 255, 0.08);
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .status {
      display: grid;
      place-items: center;
      min-height: 2.6em;
      color: var(--muted);
      font-size: clamp(0.78rem, 1.7vw, 0.95rem);
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .score {
      display: grid;
      grid-template-columns: repeat(2, minmax(52px, 1fr));
      width: 100%;
      gap: 8px;
      margin: 4px 0 12px;
    }

    .meter {
      display: grid;
      gap: 2px;
      padding: 8px 7px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      text-align: center;
    }

    .meter span {
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .meter strong {
      min-height: 1.15em;
      color: #fff;
      font-size: clamp(1.15rem, 2.7vw, 1.55rem);
      line-height: 1;
      text-shadow: 0 0 16px rgba(70, 167, 255, 0.28);
    }

    .start {
      width: min(100%, 118px);
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.04)),
        #20202d;
      color: #ffffff;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      box-shadow:
        0 0 18px rgba(53, 255, 138, 0.18),
        inset 0 0 18px rgba(255, 255, 255, 0.07);
      transition:
        border-color 120ms ease,
        box-shadow 120ms ease,
        transform 120ms ease;
    }

    .start:hover {
      border-color: rgba(53, 255, 138, 0.6);
      box-shadow:
        0 0 24px rgba(53, 255, 138, 0.26),
        inset 0 0 18px rgba(255, 255, 255, 0.08);
    }

    .start:active {
      transform: translateY(1px);
    }

    .start:focus-visible {
      outline: 3px solid rgba(70, 167, 255, 0.58);
      outline-offset: 3px;
    }

    .start:disabled {
      cursor: default;
      opacity: 0.62;
    }

    .footer {
      color: var(--muted);
      font-size: clamp(0.72rem, 2vw, 0.9rem);
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    @keyframes miss-shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @media (max-width: 560px) {
      .app {
        padding: 18px 14px;
      }

      .board-shell {
        width: min(94vw, 72svh);
      }

      .hub {
        width: clamp(134px, 36%, 172px);
        padding: 13px;
      }

      .score {
        grid-template-columns: repeat(2, minmax(46px, 1fr));
        gap: 6px;
        margin-bottom: 9px;
      }

      .meter {
        padding: 7px 5px;
      }

      .start {
        min-height: 38px;
        width: min(100%, 104px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">Simon</h1>
    </header>

    <section class="stage" aria-label="Simon game board">
      <div class="board-shell" id="board">
        <div class="pads">
          <button class="pad pad-green" type="button" data-pad="green" aria-label="Green pad"></button>
          <button class="pad pad-red" type="button" data-pad="red" aria-label="Red pad"></button>
          <button class="pad pad-yellow" type="button" data-pad="yellow" aria-label="Yellow pad"></button>
          <button class="pad pad-blue" type="button" data-pad="blue" aria-label="Blue pad"></button>
        </div>

        <div class="hub" aria-live="polite">
          <div class="status" id="status">Ready</div>
          <div class="score" aria-label="Score">
            <div class="meter">
              <span>Level</span>
              <strong id="level">0</strong>
            </div>
            <div class="meter">
              <span>Best</span>
              <strong id="best">0</strong>
            </div>
          </div>
          <button class="start" id="start" type="button" aria-label="Start game">Start</button>
        </div>
      </div>
    </section>

    <footer class="footer" id="footer">Memory sequence</footer>
  </main>

  <script>
    (() => {
      const padOrder = ["green", "red", "yellow", "blue"];
      const tones = {
        green: 329.63,
        red: 261.63,
        yellow: 220,
        blue: 392
      };
      const keyMap = {
        q: "green",
        w: "red",
        a: "yellow",
        s: "blue",
        1: "green",
        2: "red",
        3: "yellow",
        4: "blue"
      };

      const board = document.querySelector("#board");
      const statusEl = document.querySelector("#status");
      const levelEl = document.querySelector("#level");
      const bestEl = document.querySelector("#best");
      const footerEl = document.querySelector("#footer");
      const startBtn = document.querySelector("#start");
      const pads = new Map(
        Array.from(document.querySelectorAll("[data-pad]"), (pad) => [pad.dataset.pad, pad])
      );

      const state = {
        audio: null,
        sequence: [],
        inputIndex: 0,
        level: 0,
        best: Number(localStorage.getItem("simonBest") || 0),
        started: false,
        gameOver: false,
        accepting: false,
        playing: false,
        inputBusy: false,
        runId: 0
      };

      bestEl.textContent = String(state.best);

      const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

      function randomPad() {
        return padOrder[Math.floor(Math.random() * padOrder.length)];
      }

      function setStatus(text, footerText) {
        statusEl.textContent = text;
        if (footerText) {
          footerEl.textContent = footerText;
        }
      }

      function updatePanel() {
        levelEl.textContent = String(state.level);
        bestEl.textContent = String(state.best);
        startBtn.textContent = state.started ? "Restart" : state.gameOver ? "Restart" : "Start";
        startBtn.disabled = state.playing;
      }

      function getAudioContext() {
        if (!state.audio) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) {
            return null;
          }
          state.audio = new AudioContext();
        }

        if (state.audio.state === "suspended") {
          state.audio.resume();
        }

        return state.audio;
      }

      function playTone(color, duration = 0.2) {
        const ctx = getAudioContext();
        if (!ctx) {
          return;
        }

        const now = ctx.currentTime;
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(tones[color], now);
        oscillator.frequency.exponentialRampToValueAtTime(tones[color] * 1.015, now + duration);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.2, now + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + 0.03);
      }

      function playMissTone() {
        const ctx = getAudioContext();
        if (!ctx) {
          return;
        }

        const now = ctx.currentTime;
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();

        oscillator.type = "sawtooth";
        oscillator.frequency.setValueAtTime(130.81, now);
        oscillator.frequency.exponentialRampToValueAtTime(82.41, now + 0.32);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.34);

        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(now);
        oscillator.stop(now + 0.38);
      }

      async function flashPad(color, duration = 260) {
        const pad = pads.get(color);
        if (!pad) {
          return;
        }

        pad.classList.add("is-lit");
        playTone(color, Math.max(0.1, duration / 1000));
        await sleep(duration);
        pad.classList.remove("is-lit");
      }

      async function playSequence(token = state.runId) {
        state.playing = true;
        state.accepting = false;
        state.inputBusy = false;
        updatePanel();
        setStatus("Watch", "Listen");

        await sleep(420);

        const tempo = Math.max(280, 620 - state.sequence.length * 22);
        for (const color of state.sequence) {
          if (token !== state.runId) {
            return;
          }
          await flashPad(color, Math.max(170, tempo * 0.54));
          await sleep(Math.max(90, tempo * 0.36));
        }

        if (token !== state.runId) {
          return;
        }

        state.playing = false;
        state.accepting = true;
        updatePanel();
        setStatus("Repeat", "Your turn");
      }

      async function nextRound(token = state.runId) {
        if (token !== state.runId) {
          return;
        }

        state.sequence.push(randomPad());
        state.inputIndex = 0;
        state.level = state.sequence.length;
        state.best = Math.max(state.best, state.level);
        localStorage.setItem("simonBest", String(state.best));
        updatePanel();
        await playSequence(token);
      }

      async function startGame() {
        if (state.playing) {
          return;
        }

        state.runId += 1;
        state.sequence = [];
        state.inputIndex = 0;
        state.level = 0;
        state.started = true;
        state.gameOver = false;
        state.accepting = false;
        state.inputBusy = false;
        updatePanel();
        setStatus("Ready", "Memory sequence");
        await nextRound(state.runId);
      }

      async function handlePadPress(color) {
        if (!padOrder.includes(color) || state.inputBusy) {
          return;
        }

        if (!state.started && !state.playing) {
          state.inputBusy = true;
          await flashPad(color, 160);
          state.inputBusy = false;
          return;
        }

        if (!state.accepting) {
          return;
        }

        state.inputBusy = true;
        const expected = state.sequence[state.inputIndex];
        await flashPad(color, 180);

        if (color !== expected) {
          failGame(expected);
          state.inputBusy = false;
          return;
        }

        state.inputIndex += 1;

        if (state.inputIndex === state.sequence.length) {
          state.accepting = false;
          state.inputBusy = false;
          setStatus("Good", "Next pattern");
          window.setTimeout(() => nextRound(state.runId), 650);
          return;
        }

        state.inputBusy = false;
      }

      function failGame(expected) {
        state.runId += 1;
        state.accepting = false;
        state.playing = false;
        state.started = false;
        state.gameOver = true;
        playMissTone();
        updatePanel();
        setStatus("Miss", expected ? "Pattern broke" : "Try again");
        board.classList.remove("is-missed");
        void board.offsetWidth;
        board.classList.add("is-missed");
      }

      for (const [color, pad] of pads) {
        pad.addEventListener("click", () => handlePadPress(color));
      }

      startBtn.addEventListener("click", startGame);

      document.addEventListener("keydown", (event) => {
        if (event.repeat) {
          return;
        }

        const key = event.key.toLowerCase();
        if (key === " " || key === "enter") {
          event.preventDefault();
          startGame();
          return;
        }

        const color = keyMap[key];
        if (color) {
          event.preventDefault();
          handlePadPress(color);
        }
      });

      updatePanel();

      window.Simon = {
        getState: () => ({
          sequence: [...state.sequence],
          inputIndex: state.inputIndex,
          level: state.level,
          best: state.best,
          started: state.started,
          accepting: state.accepting,
          playing: state.playing,
          gameOver: state.gameOver
        }),
        handlePadPress,
        playSequence,
        startGame
      };
    })();
  </script>
</body>
</html>
