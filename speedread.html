<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Speed Reader</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{display:flex;flex-direction:column;gap:16px;width:100%;max-width:520px;align-items:center}
.title{font-size:24px;font-weight:700;color:#00ff88;letter-spacing:2px}
.display{width:100%;height:200px;background:#0d0d14;border:2px solid #1a1a2e;border-radius:16px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.word{font-size:64px;font-weight:700;color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,.3);transition:all .1s}
.word .focus{color:#ff3366}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center}
.control-group{display:flex;align-items:center;gap:6px}
.control-group label{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:2px}
.control-group input,.control-group select{background:#0d0d14;border:1px solid #1a1a2e;color:#ccc;padding:6px 10px;border-radius:6px;font-family:'Courier New',monospace;font-size:13px;outline:none;width:70px;text-align:center}
.control-group input:focus,.control-group select:focus{border-color:#00ff8844}
.btn{background:#12121a;border:1px solid #1a1a2e;color:#888;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;transition:all .15s;font-family:inherit}
.btn:hover{background:#1a1a2e;color:#ccc}
.btn.primary{background:#00ff88;color:#0a0a0f;border-color:#00ff88;font-weight:600}
.btn.primary:hover{background:#00cc6a}
.progress{width:100%;height:3px;background:#1a1a2e;border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:#00ff88;transition:width .15s}
.stats{font-size:12px;color:#666;font-family:'Courier New',monospace;display:flex;gap:16px}
.stats span{color:#00ff88}
textarea{width:100%;height:60px;background:#0d0d14;border:1px solid #1a1a2e;color:#888;border-radius:8px;padding:10px;font-family:system-ui,sans-serif;font-size:12px;resize:none;outline:none}
textarea:focus{border-color:#00ff8844}
</style>
</head>
<body>
<div class="container">
<div class="title">Speed Reader</div>
<textarea id="input" placeholder="Paste text to read, or use sample...">The quick brown fox jumps over the lazy dog. Speed reading is a skill that can be developed with practice. Each word flashes briefly on screen, training your brain to process text faster without subvocalization.</textarea>
<div class="display"><div class="word" id="word">Ready</div></div>
<div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
<div class="stats" id="stats">
<span id="pos">0/0</span> <span id="wpm-label">300 WPM</span>
</div>
<div class="controls">
<div class="control-group"><label>WPM</label><input type="number" id="wpm" value="300" min="50" max="1000" step="10"></div>
<button class="btn primary" id="btn-play">▶ Play</button>
<button class="btn" id="btn-pause">⏸ Pause</button>
<button class="btn" id="btn-reset">↺ Reset</button>
</div>
</div>
<script>
let words = [], index = 0, playing = false, timer = null, wpm = 300;

const wordEl = document.getElementById('word'), progressBar = document.getElementById('progress-bar'),
posEl = document.getElementById('pos'), wpmLabel = document.getElementById('wpm-label'),
input = document.getElementById('input'), btnPlay = document.getElementById('btn-play');

function parseText() {
words = input.value.split(/\s+/).filter(w => w.length > 0);
index = 0;
}

function getPause(word) {
const len = word.replace(/[^a-zA-Z]/g, '').length;
if (len <= 2) return 1.2;
if (len <= 4) return 1.0;
if (len <= 7) return 0.85;
return 0.7;
}

function showWord() {
if (index >= words.length) { stop(); return; }
const w = words[index];
const len = w.replace(/[^a-zA-Z]/g, '').length;
let focusIdx;
if (len <= 2) focusIdx = 0;
else if (len <= 5) focusIdx = 1;
else if (len <= 9) focusIdx = Math.floor(len / 2);
else focusIdx = Math.floor(len / 3);

const pre = w.slice(0, focusIdx), focus = w[focusIdx], post = w.slice(focusIdx + 1);
wordEl.innerHTML = pre + '<span class="focus">' + focus + '</span>' + post;

progressBar.style.width = ((index / words.length) * 100) + '%';
posEl.textContent = (index + 1) + '/' + words.length;
wpmLabel.textContent = wpm + ' WPM';

const delay = (60 / wpm) * 1000 * getPause(w);
index++;
timer = setTimeout(showWord, delay);
}

function play() {
if (index >= words.length) { parseText(); index = 0; }
playing = true; btnPlay.textContent = '⏸ Playing';
showWord();
}

function pause() {
playing = false; clearTimeout(timer);
btnPlay.textContent = '▶ Resume';
}

function stop() {
playing = false; clearTimeout(timer);
index = 0; wordEl.textContent = 'Ready';
progressBar.style.width = '0%'; posEl.textContent = '0/' + words.length;
btnPlay.textContent = '▶ Play';
}

function reset() {
stop(); parseText();
posEl.textContent = '0/' + words.length; wordEl.textContent = 'Ready';
}

btnPlay.addEventListener('click', () => { if (playing) pause(); else play(); });
document.getElementById('btn-pause').addEventListener('click', pause);
document.getElementById('btn-reset').addEventListener('click', reset);

document.getElementById('wpm').addEventListener('change', e => {
wpm = parseInt(e.target.value) || 300;
wpmLabel.textContent = wpm + ' WPM';
if (playing) { clearTimeout(timer); showWord(); }
});
input.addEventListener('input', reset);
document.addEventListener('keydown', e => {
if (e.code === 'Space' && document.activeElement !== input) { e.preventDefault(); if (playing) pause(); else play(); }
if (e.code === 'ArrowLeft') { e.preventDefault(); wpm = Math.max(50, wpm - 10); document.getElementById('wpm').value = wpm; wpmLabel.textContent = wpm + ' WPM'; }
if (e.code === 'ArrowRight') { e.preventDefault(); wpm = Math.min(1000, wpm + 10); document.getElementById('wpm').value = wpm; wpmLabel.textContent = wpm + ' WPM'; }
});

window.addEventListener('load', () => { parseText(); posEl.textContent = '0/' + words.length; });
</script>
</body>
</html>
