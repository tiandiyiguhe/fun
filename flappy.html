<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Neon Flappy</title>
  <style>
    :root {
      color-scheme: dark;
      background: #03020a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #03020a;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(180deg, rgba(3, 2, 10, 0) 58%, rgba(7, 255, 219, 0.06) 78%, rgba(255, 43, 214, 0.08) 100%),
        linear-gradient(90deg, rgba(255, 43, 214, 0.08), rgba(0, 246, 255, 0.03) 35%, rgba(158, 255, 56, 0.05) 74%, rgba(3, 2, 10, 0.08));
      mix-blend-mode: screen;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      content: "";
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          rgba(0, 0, 0, 0.17) 2px,
          rgba(0, 0, 0, 0.17) 4px
        );
      box-shadow: inset 0 0 110px rgba(0, 0, 0, 0.75);
      opacity: 0.58;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      background: #03020a;
      cursor: pointer;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <canvas id="game" aria-label="Neon Flappy canvas game"></canvas>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const STORE_KEY = "neon-flappy-best-v1";
      const GRAVITY = 1800;
      const FLAP = -520;
      const MAX_DT = 0.033;

      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const lerp = (a, b, t) => a + (b - a) * t;

      let view = { w: 1, h: 1, dpr: 1 };
      let state;
      let lastTime = 0;
      let shake = 0;
      let flash = 0;
      let pulse = 0;
      let trailClock = 0;
      let particles = [];
      let skyline = [];

      function readBest() {
        try {
          return Number(localStorage.getItem(STORE_KEY) || 0);
        } catch {
          return 0;
        }
      }

      function writeBest(value) {
        try {
          localStorage.setItem(STORE_KEY, String(value));
        } catch {
          // Ignore private-mode storage failures. The current run still tracks best in memory.
        }
      }

      function difficultyForScore(score) {
        const level = Math.min(score, 32);
        return {
          speed: Math.round(235 + level * 7.5),
          pipeGap: Math.max(132, 190 - level * 2.6),
          spawnEvery: Math.max(1.08, 1.48 - level * 0.012),
        };
      }

      function createGameState(width, height, best = 0) {
        const radius = clamp(Math.min(width, height) * 0.031, 15, 22);
        return {
          width,
          height,
          status: "ready",
          score: 0,
          best,
          time: 0,
          speed: 235,
          spawnTimer: 0.28,
          deadTime: 0,
          newBest: false,
          bird: {
            x: Math.round(width * 0.28),
            y: Math.round(height * 0.45),
            baseY: Math.round(height * 0.45),
            vy: 0,
            radius,
            rotation: 0,
          },
          pipes: [],
        };
      }

      function flapBird(bird, impulse = FLAP) {
        return {
          ...bird,
          vy: impulse,
        };
      }

      function updateBird(bird, dt, gravity = GRAVITY) {
        const vy = bird.vy + gravity * dt;
        return {
          ...bird,
          vy,
          y: bird.y + vy * dt,
          rotation: clamp(vy / 620, -0.55, 1.15),
        };
      }

      function spawnPipe(width, height, score = 0, random = Math.random()) {
        const difficulty = difficultyForScore(score);
        const gap = clamp(difficulty.pipeGap, Math.max(118, height * 0.21), Math.max(130, height * 0.34));
        const margin = Math.max(82, gap * 0.68);
        return {
          x: width + 20,
          width: clamp(width * 0.092, 58, 84),
          gapY: margin + random * Math.max(1, height - margin * 2),
          gap,
          passed: false,
          hue: 178 + Math.random() * 70,
        };
      }

      function updatePipes(current, dt) {
        const moved = current.pipes
          .map((pipe) => ({ ...pipe, x: pipe.x - current.speed * dt }))
          .filter((pipe) => pipe.x + pipe.width > -40);

        let score = current.score;
        const pipes = moved.map((pipe) => {
          if (!pipe.passed && pipe.x + pipe.width < current.bird.x) {
            score += 1;
            addScoreBurst(current.bird.x, current.bird.y);
            return { ...pipe, passed: true };
          }
          return pipe;
        });

        return {
          ...current,
          score,
          pipes,
        };
      }

      function collides(bird, pipes, width, height) {
        if (bird.y - bird.radius <= 0 || bird.y + bird.radius >= height) {
          return true;
        }

        return pipes.some((pipe) => {
          const overlapsX = bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipe.width;
          if (!overlapsX) return false;

          const topLimit = pipe.gapY - pipe.gap / 2;
          const bottomLimit = pipe.gapY + pipe.gap / 2;
          return bird.y - bird.radius < topLimit || bird.y + bird.radius > bottomLimit;
        });
      }

      function rebuildSkyline() {
        const layers = [
          { count: 30, minW: 36, maxW: 86, minH: 90, maxH: 240, speed: 0.10, alpha: 0.28 },
          { count: 26, minW: 44, maxW: 104, minH: 120, maxH: 315, speed: 0.18, alpha: 0.46 },
          { count: 24, minW: 54, maxW: 128, minH: 155, maxH: 405, speed: 0.29, alpha: 0.72 },
        ];

        skyline = layers.map((layer, layerIndex) => {
          let x = 0;
          const buildings = [];
          for (let i = 0; i < layer.count; i += 1) {
            const rand = pseudoRandom(i * 19 + layerIndex * 131);
            const rand2 = pseudoRandom(i * 41 + layerIndex * 79);
            const w = lerp(layer.minW, layer.maxW, rand);
            const h = lerp(layer.minH, layer.maxH, rand2) * clamp(view.h / 760, 0.72, 1.18);
            buildings.push({
              x,
              w,
              h,
              cap: pseudoRandom(i * 7 + layerIndex * 23) > 0.66,
              antenna: pseudoRandom(i * 11 + layerIndex * 31) > 0.78,
              lit: Math.floor(2 + pseudoRandom(i * 47 + layerIndex * 17) * 5),
            });
            x += w + lerp(12, 38, pseudoRandom(i * 61 + layerIndex * 5));
          }
          return { ...layer, width: Math.max(x, view.w + 200), buildings };
        });
      }

      function pseudoRandom(seed) {
        const n = Math.sin(seed * 12.9898) * 43758.5453;
        return n - Math.floor(n);
      }

      function fitCanvas() {
        const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
        view = {
          w: Math.max(320, window.innerWidth),
          h: Math.max(460, window.innerHeight),
          dpr,
        };

        canvas.width = Math.floor(view.w * dpr);
        canvas.height = Math.floor(view.h * dpr);
        canvas.style.width = `${view.w}px`;
        canvas.style.height = `${view.h}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        rebuildSkyline();

        if (!state) {
          state = createGameState(view.w, view.h, readBest());
          return;
        }

        const oldW = state.width || view.w;
        const oldH = state.height || view.h;
        state.width = view.w;
        state.height = view.h;
        state.bird.x = Math.round(view.w * 0.28);
        state.bird.y = clamp(state.bird.y * (view.h / oldH), state.bird.radius + 2, view.h - state.bird.radius - 2);
        state.bird.baseY = Math.round(view.h * 0.45);
        state.bird.radius = clamp(Math.min(view.w, view.h) * 0.031, 15, 22);
        state.pipes = state.pipes.map((pipe) => ({
          ...pipe,
          x: pipe.x * (view.w / oldW),
          gapY: pipe.gapY * (view.h / oldH),
          width: clamp(view.w * 0.092, 58, 84),
        }));
      }

      function reset(nextStatus = "ready") {
        state = createGameState(view.w, view.h, Math.max(readBest(), state ? state.best : 0));
        state.status = nextStatus;
        particles = [];
        shake = 0;
        flash = 0;
        trailClock = 0;
        if (nextStatus === "playing") {
          state.bird = flapBird(state.bird);
          emitFlap(state.bird.x, state.bird.y, 1);
        }
      }

      function command() {
        if (state.status === "dead") {
          reset("playing");
          return;
        }

        if (state.status === "ready") {
          state.status = "playing";
          state.spawnTimer = 0.12;
        }

        if (state.status === "playing") {
          state.bird = flapBird(state.bird);
          emitFlap(state.bird.x, state.bird.y, 0.7);
        }
      }

      function die() {
        if (state.status === "dead") return;
        state.status = "dead";
        state.deadTime = 0;
        state.bird.vy = -180;
        state.bird.rotation = 1.25;
        shake = 18;
        flash = 1;
        state.newBest = state.score > state.best;
        if (state.newBest) {
          state.best = state.score;
          writeBest(state.best);
        }
        emitDeath(state.bird.x, state.bird.y);
      }

      function update(dt) {
        pulse += dt;
        flash = Math.max(0, flash - dt * 2.8);
        shake = Math.max(0, shake - dt * 24);
        updateParticles(dt);

        if (state.status === "ready") {
          state.time += dt * 0.65;
          state.bird.y = state.bird.baseY + Math.sin(pulse * 3.4) * 11;
          state.bird.rotation = Math.sin(pulse * 3.1) * 0.12;
          trailClock += dt;
          if (trailClock > 0.06) {
            trailClock = 0;
            emitTrail(state.bird.x - state.bird.radius * 0.9, state.bird.y + 4);
          }
          return;
        }

        if (state.status === "playing") {
          state.time += dt;
          const difficulty = difficultyForScore(state.score);
          state.speed = difficulty.speed;
          state.spawnTimer -= dt;
          if (state.spawnTimer <= 0) {
            state.pipes.push(spawnPipe(state.width, state.height, state.score));
            state.spawnTimer += difficulty.spawnEvery;
          }

          state.bird = updateBird(state.bird, dt);
          state = updatePipes(state, dt);

          trailClock += dt;
          while (trailClock > 0.035) {
            trailClock -= 0.035;
            emitTrail(state.bird.x - state.bird.radius * 0.8, state.bird.y + state.bird.radius * 0.28);
          }

          if (collides(state.bird, state.pipes, state.width, state.height)) {
            die();
          }
          return;
        }

        state.time += dt * 0.2;
        state.deadTime += dt;
        state.bird = updateBird(state.bird, dt, GRAVITY * 0.78);
        state.bird.rotation += dt * 5.2;
        if (state.bird.y + state.bird.radius > state.height) {
          state.bird.y = state.height - state.bird.radius;
          state.bird.vy *= -0.13;
        }
      }

      function emitTrail(x, y) {
        particles.push({
          x,
          y,
          vx: -80 - Math.random() * 105,
          vy: (Math.random() - 0.5) * 48,
          size: 2 + Math.random() * 4,
          life: 0.42,
          maxLife: 0.42,
          color: Math.random() > 0.5 ? "#16f7ff" : "#ff2bd6",
        });
      }

      function emitFlap(x, y, amount) {
        const count = Math.round(10 * amount);
        for (let i = 0; i < count; i += 1) {
          particles.push({
            x: x - 8,
            y: y + 4,
            vx: -90 - Math.random() * 180,
            vy: -80 + Math.random() * 170,
            size: 2 + Math.random() * 5,
            life: 0.32 + Math.random() * 0.22,
            maxLife: 0.54,
            color: i % 3 === 0 ? "#dfff2f" : i % 3 === 1 ? "#16f7ff" : "#ff2bd6",
          });
        }
      }

      function emitDeath(x, y) {
        for (let i = 0; i < 72; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 90 + Math.random() * 520;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 8,
            life: 0.62 + Math.random() * 0.58,
            maxLife: 1.2,
            color: i % 4 === 0 ? "#fff45c" : i % 4 === 1 ? "#16f7ff" : i % 4 === 2 ? "#ff2bd6" : "#9eff38",
          });
        }
      }

      function addScoreBurst(x, y) {
        for (let i = 0; i < 16; i += 1) {
          particles.push({
            x,
            y,
            vx: -40 + Math.random() * 80,
            vy: -180 - Math.random() * 120,
            size: 2 + Math.random() * 4,
            life: 0.42 + Math.random() * 0.3,
            maxLife: 0.72,
            color: i % 2 ? "#9eff38" : "#fff45c",
          });
        }
      }

      function updateParticles(dt) {
        particles = particles
          .map((particle) => ({
            ...particle,
            x: particle.x + particle.vx * dt,
            y: particle.y + particle.vy * dt,
            vy: particle.vy + 60 * dt,
            life: particle.life - dt,
          }))
          .filter((particle) => particle.life > 0);
      }

      function render() {
        ctx.save();
        ctx.clearRect(0, 0, view.w, view.h);

        if (shake > 0) {
          const amount = shake * shake * 0.035;
          ctx.translate((Math.random() - 0.5) * amount, (Math.random() - 0.5) * amount);
        }

        drawBackground();
        drawPipes();
        drawParticles();
        drawBird();
        drawHud();

        if (flash > 0) {
          ctx.save();
          ctx.globalAlpha = flash * 0.26;
          ctx.fillStyle = "#fff45c";
          ctx.fillRect(0, 0, view.w, view.h);
          ctx.restore();
        }

        ctx.restore();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, view.h);
        gradient.addColorStop(0, "#050012");
        gradient.addColorStop(0.44, "#0a0630");
        gradient.addColorStop(0.72, "#09071d");
        gradient.addColorStop(1, "#020106");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, view.w, view.h);

        drawStars();
        drawCity();
        drawGrid();
      }

      function drawStars() {
        ctx.save();
        const drift = state.time * 16;
        for (let i = 0; i < 70; i += 1) {
          const x = (pseudoRandom(i * 13) * view.w + drift * (0.08 + pseudoRandom(i) * 0.18)) % view.w;
          const y = pseudoRandom(i * 29) * view.h * 0.56;
          const alpha = 0.18 + pseudoRandom(i * 37) * 0.6;
          ctx.globalAlpha = alpha * (0.7 + Math.sin(pulse * 2 + i) * 0.22);
          ctx.fillStyle = i % 5 === 0 ? "#ff2bd6" : i % 3 === 0 ? "#9eff38" : "#d7fcff";
          ctx.fillRect(x, y, 1.5, 1.5);
        }
        ctx.restore();
      }

      function drawCity() {
        const horizon = view.h * 0.78;
        skyline.forEach((layer, layerIndex) => {
          const offset = (state.time * state.speed * layer.speed) % layer.width;
          const baseY = horizon + layerIndex * view.h * 0.025;
          drawCityLayer(layer, baseY, offset, layerIndex);
        });

        ctx.save();
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 22;
        ctx.strokeStyle = "rgba(22, 247, 255, 0.55)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, horizon + 2);
        ctx.lineTo(view.w, horizon + 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawCityLayer(layer, baseY, offset, layerIndex) {
        ctx.save();
        ctx.globalAlpha = layer.alpha;

        const repeats = Math.ceil(view.w / layer.width) + 2;
        for (let repeat = -1; repeat < repeats; repeat += 1) {
          const origin = repeat * layer.width - offset;
          layer.buildings.forEach((building, index) => {
            const x = origin + building.x;
            const y = baseY - building.h;
            if (x + building.w < -60 || x > view.w + 60) return;

            const body = ctx.createLinearGradient(0, y, 0, baseY);
            body.addColorStop(0, layerIndex === 0 ? "#161142" : "#100d36");
            body.addColorStop(1, layerIndex === 2 ? "#050414" : "#090722");
            ctx.fillStyle = body;
            ctx.fillRect(x, y, building.w, building.h);

            ctx.shadowBlur = 13 - layerIndex * 2;
            ctx.shadowColor = index % 2 ? "#ff2bd6" : "#16f7ff";
            ctx.strokeStyle = index % 2 ? "rgba(255, 43, 214, 0.35)" : "rgba(22, 247, 255, 0.32)";
            ctx.lineWidth = 1;
            ctx.strokeRect(x + 0.5, y + 0.5, building.w - 1, building.h - 1);
            ctx.shadowBlur = 0;

            const windowColor = index % 3 === 0 ? "#9eff38" : index % 3 === 1 ? "#16f7ff" : "#ff2bd6";
            ctx.fillStyle = windowColor;
            ctx.globalAlpha = layer.alpha * 0.78;
            const cols = Math.max(2, Math.floor(building.w / 18));
            for (let c = 0; c < cols; c += 1) {
              for (let r = 0; r < building.lit; r += 1) {
                if (pseudoRandom(index * 101 + c * 17 + r * 29 + layerIndex) < 0.42) continue;
                const wx = x + 8 + c * ((building.w - 16) / cols);
                const wy = y + 16 + r * 24;
                if (wy < baseY - 12) ctx.fillRect(wx, wy, 5, 9);
              }
            }
            ctx.globalAlpha = layer.alpha;

            if (building.cap) {
              ctx.fillStyle = index % 2 ? "rgba(255, 43, 214, 0.42)" : "rgba(22, 247, 255, 0.42)";
              ctx.fillRect(x + building.w * 0.2, y - 7, building.w * 0.6, 7);
            }

            if (building.antenna) {
              ctx.strokeStyle = "rgba(255, 244, 92, 0.7)";
              ctx.beginPath();
              ctx.moveTo(x + building.w * 0.52, y);
              ctx.lineTo(x + building.w * 0.52, y - 28);
              ctx.stroke();
            }
          });
        }

        ctx.restore();
      }

      function drawGrid() {
        const floorY = view.h * 0.8;
        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = "rgba(22, 247, 255, 0.25)";
        ctx.lineWidth = 1;

        for (let i = 0; i < 12; i += 1) {
          const t = i / 11;
          const y = lerp(floorY, view.h, t * t);
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(view.w, y);
          ctx.stroke();
        }

        const scroll = (state.time * state.speed * 0.42) % 64;
        for (let x = -view.w; x < view.w * 2; x += 64) {
          const sx = x - scroll;
          ctx.beginPath();
          ctx.moveTo(view.w * 0.5, floorY);
          ctx.lineTo(sx, view.h);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPipes() {
        state.pipes.forEach((pipe) => {
          drawPipe(pipe, 0, pipe.gapY - pipe.gap / 2, true);
          drawPipe(pipe, pipe.gapY + pipe.gap / 2, view.h - (pipe.gapY + pipe.gap / 2), false);
        });
      }

      function drawPipe(pipe, y, height, top) {
        if (height <= 0) return;

        const x = pipe.x;
        const w = pipe.width;
        const capH = 24;
        const capY = top ? y + height - capH : y;
        const hue = pipe.hue;

        ctx.save();
        ctx.shadowColor = `hsla(${hue}, 100%, 58%, 0.9)`;
        ctx.shadowBlur = 18;

        const pipeGradient = ctx.createLinearGradient(x, 0, x + w, 0);
        pipeGradient.addColorStop(0, "rgba(9, 255, 232, 0.18)");
        pipeGradient.addColorStop(0.18, `hsla(${hue}, 100%, 46%, 0.88)`);
        pipeGradient.addColorStop(0.58, "rgba(7, 14, 34, 0.92)");
        pipeGradient.addColorStop(1, "rgba(255, 43, 214, 0.68)");

        ctx.fillStyle = pipeGradient;
        ctx.fillRect(x, y, w, height);

        const capX = x - 8;
        const capW = w + 16;
        ctx.fillStyle = top ? "rgba(255, 43, 214, 0.82)" : "rgba(22, 247, 255, 0.84)";
        ctx.fillRect(capX, capY, capW, capH);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.62)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 1, y + 1, w - 2, height - 2);
        ctx.strokeRect(capX + 1, capY + 1, capW - 2, capH - 2);

        ctx.globalAlpha = 0.55;
        ctx.strokeStyle = "rgba(255, 244, 92, 0.72)";
        for (let stripe = y + 18; stripe < y + height - 14; stripe += 34) {
          ctx.beginPath();
          ctx.moveTo(x + 10, stripe);
          ctx.lineTo(x + w - 10, stripe);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawParticles() {
        ctx.save();
        particles.forEach((particle) => {
          const life = particle.life / particle.maxLife;
          ctx.globalAlpha = clamp(life, 0, 1);
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 15;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, Math.max(0.5, particle.size * life), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();
      }

      function drawBird() {
        const bird = state.bird;
        ctx.save();
        ctx.translate(bird.x, bird.y);
        ctx.rotate(bird.rotation);

        ctx.shadowColor = "#ff2bd6";
        ctx.shadowBlur = 24;
        ctx.fillStyle = "#ff2bd6";
        ctx.beginPath();
        ctx.ellipse(0, 0, bird.radius * 1.16, bird.radius * 0.9, 0, 0, Math.PI * 2);
        ctx.fill();

        const body = ctx.createRadialGradient(-bird.radius * 0.25, -bird.radius * 0.28, 2, 0, 0, bird.radius * 1.35);
        body.addColorStop(0, "#fff45c");
        body.addColorStop(0.38, "#16f7ff");
        body.addColorStop(1, "#3721ff");
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 18;
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.ellipse(0, 0, bird.radius * 1.03, bird.radius * 0.78, 0, 0, Math.PI * 2);
        ctx.fill();

        const wingLift = Math.sin(pulse * 22) * 0.36;
        ctx.shadowColor = "#9eff38";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#9eff38";
        ctx.beginPath();
        ctx.ellipse(-bird.radius * 0.24, bird.radius * 0.22, bird.radius * 0.6, bird.radius * 0.28, wingLift, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "#fff";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(bird.radius * 0.42, -bird.radius * 0.28, bird.radius * 0.18, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#050012";
        ctx.beginPath();
        ctx.arc(bird.radius * 0.48, -bird.radius * 0.26, bird.radius * 0.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "#fff45c";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#fff45c";
        ctx.beginPath();
        ctx.moveTo(bird.radius * 0.9, -bird.radius * 0.08);
        ctx.lineTo(bird.radius * 1.52, bird.radius * 0.08);
        ctx.lineTo(bird.radius * 0.88, bird.radius * 0.24);
        ctx.closePath();
        ctx.fill();

        ctx.restore();
      }

      function drawHud() {
        drawScore();

        if (state.status === "ready") {
          drawReady();
          return;
        }

        if (state.status === "dead") {
          drawGameOver();
        }
      }

      function drawScore() {
        ctx.save();
        const scoreSize = clamp(view.h * 0.076, 42, 70);
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.font = `900 ${scoreSize}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 18;
        ctx.fillStyle = "#dffcff";
        ctx.fillText(String(state.score), view.w / 2, Math.max(20, view.h * 0.045));

        ctx.textAlign = "right";
        ctx.font = `800 ${clamp(view.h * 0.024, 15, 22)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#ff2bd6";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#f8c8ff";
        ctx.fillText(`BEST ${state.best}`, view.w - 22, 22);
        ctx.restore();
      }

      function drawReady() {
        ctx.save();
        const y = view.h * 0.28;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${clamp(view.h * 0.074, 42, 76)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#ff2bd6";
        ctx.shadowBlur = 26;
        ctx.fillStyle = "#fff";
        ctx.fillText("NEON FLAP", view.w / 2, y);

        const barW = clamp(view.w * 0.42, 170, 360);
        const barY = y + clamp(view.h * 0.085, 52, 82);
        const phase = 0.5 + Math.sin(pulse * 4) * 0.5;
        ctx.globalAlpha = 0.55 + phase * 0.3;
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 18;
        ctx.strokeStyle = "#16f7ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(view.w / 2 - barW / 2, barY);
        ctx.lineTo(view.w / 2 + barW / 2, barY);
        ctx.stroke();

        ctx.globalAlpha = 1;
        ctx.font = `800 ${clamp(view.h * 0.024, 15, 22)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#9eff38";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#eaffc2";
        ctx.fillText(`BEST ${state.best}`, view.w / 2, barY + 34);
        ctx.restore();
      }

      function drawGameOver() {
        ctx.save();
        ctx.fillStyle = "rgba(3, 2, 10, 0.46)";
        ctx.fillRect(0, 0, view.w, view.h);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `900 ${clamp(view.h * 0.06, 34, 64)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#ff2bd6";
        ctx.shadowBlur = 28;
        ctx.fillStyle = "#fff";
        ctx.fillText("GAME OVER", view.w / 2, view.h * 0.34);

        ctx.font = `900 ${clamp(view.h * 0.038, 24, 38)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "#dffcff";
        ctx.fillText(`SCORE ${state.score}`, view.w / 2, view.h * 0.43);

        ctx.font = `800 ${clamp(view.h * 0.027, 18, 26)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.shadowColor = state.newBest ? "#fff45c" : "#9eff38";
        ctx.shadowBlur = 14;
        ctx.fillStyle = state.newBest ? "#fff45c" : "#eaffc2";
        ctx.fillText(state.newBest ? "NEW BEST" : `BEST ${state.best}`, view.w / 2, view.h * 0.49);

        const y = view.h * 0.59;
        const w = clamp(view.w * 0.36, 150, 280);
        const h = 46;
        ctx.shadowColor = "#16f7ff";
        ctx.shadowBlur = 22;
        ctx.strokeStyle = "#16f7ff";
        ctx.lineWidth = 2;
        ctx.strokeRect(view.w / 2 - w / 2, y - h / 2, w, h);

        ctx.font = `900 ${clamp(view.h * 0.024, 16, 22)}px Inter, ui-sans-serif, system-ui, sans-serif`;
        ctx.fillStyle = "#ffffff";
        ctx.fillText("RESTART", view.w / 2, y + 1);
        ctx.restore();
      }

      function frame(time) {
        if (!lastTime) lastTime = time;
        const dt = Math.min(MAX_DT, (time - lastTime) / 1000 || 0);
        lastTime = time;
        update(dt);
        render();
        requestAnimationFrame(frame);
      }

      window.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.key === " ") {
          event.preventDefault();
          command();
        }
      });

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        command();
      });

      window.addEventListener("resize", fitCanvas);
      window.addEventListener("orientationchange", fitCanvas);

      window.FlappyLogic = {
        createGameState,
        difficultyForScore,
        flapBird,
        spawnPipe,
        updateBird,
        updatePipes,
        collides,
      };

      fitCanvas();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
