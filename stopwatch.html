<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Stopwatch + Timer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070b;
      --panel: rgba(10, 15, 24, 0.86);
      --panel-strong: rgba(13, 20, 32, 0.96);
      --line: rgba(222, 244, 255, 0.16);
      --line-hot: rgba(95, 242, 218, 0.66);
      --text: #f4fbff;
      --soft: #aebed0;
      --muted: #728096;
      --cyan: #5ff2da;
      --mint: #9cffbd;
      --pink: #ff4fa3;
      --amber: #ffd166;
      --red: #ff5470;
      --blue: #70a7ff;
      --shadow: 0 26px 90px rgba(0, 0, 0, 0.5);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      letter-spacing: 0;
    }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 32%),
        linear-gradient(135deg, #05070b 0%, #0a1018 46%, #0c0b13 100%);
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.042) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.026) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.92), transparent 82%);
      opacity: 0.68;
    }

    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(95, 242, 218, 0.1), transparent 28%, transparent 70%, rgba(255, 79, 163, 0.08)),
        linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.5) 100%);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      width: min(1120px, calc(100% - 32px));
      min-height: 100dvh;
      margin: 0 auto;
      padding: 18px 0;
      align-items: stretch;
    }

    .stage,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.015)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.14);
    }

    .stage {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: calc(100dvh - 36px);
      overflow: hidden;
    }

    .stage::before {
      position: absolute;
      inset: 0;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(95, 242, 218, 0.11), transparent 38%),
        linear-gradient(305deg, rgba(255, 79, 163, 0.1), transparent 44%);
      opacity: 0.82;
    }

    .topbar {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 13, 0.5);
    }

    .brand {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 1.34rem;
      line-height: 1.08;
      font-weight: 850;
    }

    .status {
      min-height: 1.25rem;
      margin: 0;
      color: var(--soft);
      font-size: 0.9rem;
    }

    .mode-tabs {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
    }

    .mode-tab {
      min-width: 108px;
      min-height: 38px;
      padding: 0 13px;
      border-radius: 6px;
      background: transparent;
      color: var(--soft);
      font-size: 0.92rem;
      font-weight: 780;
      transition: background 170ms ease, color 170ms ease, box-shadow 170ms ease;
    }

    .mode-tab[aria-pressed="true"] {
      color: #06100f;
      background: linear-gradient(135deg, var(--cyan), var(--mint));
      box-shadow: 0 0 22px rgba(95, 242, 218, 0.24);
    }

    .time-area {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-width: 0;
      padding: 28px 18px;
    }

    .time-ring {
      position: relative;
      display: grid;
      width: min(100%, 510px);
      aspect-ratio: 1;
      place-items: center;
      border: 1px solid rgba(95, 242, 218, 0.24);
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(95, 242, 218, 0.15), transparent 36%),
        radial-gradient(circle at center, rgba(255, 79, 163, 0.09), transparent 64%),
        rgba(3, 6, 10, 0.42);
      box-shadow:
        inset 0 0 52px rgba(95, 242, 218, 0.09),
        inset 0 0 120px rgba(255, 79, 163, 0.05),
        0 0 46px rgba(95, 242, 218, 0.12);
    }

    .time-ring::before,
    .time-ring::after {
      position: absolute;
      inset: 18px;
      content: "";
      pointer-events: none;
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 50%;
    }

    .time-ring::after {
      inset: 36px;
      border-style: solid;
      border-color: rgba(255, 79, 163, 0.18);
    }

    .time-stack {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      width: min(100%, 440px);
      justify-items: center;
      padding: 34px 20px;
      text-align: center;
    }

    .readout {
      width: 100%;
      min-height: 1.14em;
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 5.45rem;
      font-weight: 850;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 16px rgba(95, 242, 218, 0.72),
        0 0 42px rgba(95, 242, 218, 0.2);
      white-space: nowrap;
    }

    .readout.warning {
      color: var(--amber);
      text-shadow:
        0 0 16px rgba(255, 209, 102, 0.68),
        0 0 42px rgba(255, 209, 102, 0.2);
    }

    .readout.finished {
      color: var(--pink);
      text-shadow:
        0 0 16px rgba(255, 79, 163, 0.75),
        0 0 46px rgba(255, 79, 163, 0.24);
      animation: finishPulse 680ms ease-in-out infinite alternate;
    }

    .subreadout {
      min-height: 1.35rem;
      margin: 0;
      color: var(--soft);
      font-family: var(--mono);
      font-size: 0.95rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      border-top: 1px solid var(--line);
      background: rgba(5, 8, 13, 0.44);
    }

    .control-btn,
    .preset-btn,
    .set-btn {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 0.94rem;
      font-weight: 820;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .control-btn {
      min-width: 108px;
      padding: 0 16px;
    }

    .control-btn:hover:not(:disabled),
    .preset-btn:hover:not(:disabled),
    .set-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(95, 242, 218, 0.5);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 22px rgba(95, 242, 218, 0.12);
    }

    .control-btn.primary {
      border-color: rgba(95, 242, 218, 0.72);
      background: linear-gradient(135deg, var(--cyan), var(--mint));
      color: #04100f;
      box-shadow: 0 0 28px rgba(95, 242, 218, 0.2);
    }

    .control-btn.stop {
      border-color: rgba(255, 79, 163, 0.6);
      background: linear-gradient(135deg, rgba(255, 79, 163, 0.94), rgba(255, 84, 112, 0.94));
      color: #16040b;
      box-shadow: 0 0 28px rgba(255, 79, 163, 0.18);
    }

    .control-btn.ghost {
      color: var(--soft);
    }

    .control-btn.reset {
      border-color: rgba(255, 84, 112, 0.44);
      color: #ffc5cf;
    }

    .side-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: calc(100dvh - 36px);
      overflow: hidden;
    }

    .timer-setup {
      display: grid;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 13, 0.28);
    }

    .timer-setup[hidden] {
      display: none;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 0.9rem;
      font-weight: 850;
      text-transform: uppercase;
      color: var(--soft);
    }

    .duration-label {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.86rem;
      font-variant-numeric: tabular-nums;
    }

    .duration-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.28);
      color: var(--text);
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 780;
      font-variant-numeric: tabular-nums;
      outline: none;
      padding: 0 10px;
    }

    .field input:focus {
      border-color: var(--line-hot);
      box-shadow: 0 0 0 3px rgba(95, 242, 218, 0.12);
    }

    .set-btn {
      min-width: 70px;
      padding: 0 14px;
      border-color: rgba(95, 242, 218, 0.48);
      color: var(--cyan);
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .preset-btn {
      min-width: 0;
      padding: 0 8px;
      color: var(--soft);
      font-family: var(--mono);
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }

    .preset-btn.active {
      border-color: rgba(255, 209, 102, 0.74);
      color: var(--amber);
      background: rgba(255, 209, 102, 0.08);
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.12);
    }

    .laps-panel {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-height: 0;
    }

    .laps-head {
      display: grid;
      grid-template-columns: 64px 1fr 1fr;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .lap-list {
      min-height: 0;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      list-style: none;
      scrollbar-color: rgba(95, 242, 218, 0.35) transparent;
    }

    .empty-laps {
      display: grid;
      min-height: 220px;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 0.94rem;
    }

    .lap-row {
      display: grid;
      grid-template-columns: 64px 1fr 1fr;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.075);
      font-family: var(--mono);
      font-size: 0.92rem;
      font-variant-numeric: tabular-nums;
    }

    .lap-row:nth-child(odd) {
      background: rgba(255, 255, 255, 0.024);
    }

    .lap-index {
      color: var(--soft);
      font-weight: 820;
    }

    .lap-total {
      color: var(--cyan);
    }

    .lap-diff {
      color: var(--amber);
    }

    .lap-diff.fastest {
      color: var(--mint);
      text-shadow: 0 0 12px rgba(156, 255, 189, 0.32);
    }

    .lap-diff.slowest {
      color: var(--pink);
    }

    @keyframes finishPulse {
      from {
        opacity: 1;
        transform: scale(1);
      }
      to {
        opacity: 0.74;
        transform: scale(1.015);
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .stage,
      .side-panel {
        min-height: auto;
      }

      .side-panel {
        grid-template-rows: auto auto;
      }

      .lap-list {
        max-height: 320px;
      }

      .readout {
        font-size: 4.45rem;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: min(100% - 20px, 1120px);
        gap: 10px;
        padding: 10px 0;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .mode-tabs {
        width: 100%;
      }

      .mode-tab {
        min-width: 0;
      }

      .time-area {
        padding: 18px 12px;
      }

      .time-ring::before {
        inset: 12px;
      }

      .time-ring::after {
        inset: 26px;
      }

      .readout {
        font-size: 3.25rem;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .control-btn {
        width: 100%;
        min-width: 0;
      }

      .duration-inputs {
        grid-template-columns: 1fr 1fr;
      }

      .set-btn {
        grid-column: 1 / -1;
        width: 100%;
      }

      .presets {
        grid-template-columns: repeat(2, 1fr);
      }

      .laps-head,
      .lap-row {
        grid-template-columns: 52px 1fr 1fr;
        gap: 8px;
        padding-left: 12px;
        padding-right: 12px;
      }
    }

    @media (max-width: 390px) {
      .readout {
        font-size: 2.72rem;
      }

      .subreadout {
        font-size: 0.82rem;
      }

      .control-btn {
        font-size: 0.86rem;
        padding: 0 10px;
      }

      .laps-head,
      .lap-row {
        grid-template-columns: 44px 1fr 1fr;
        font-size: 0.8rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Neon stopwatch and countdown timer">
    <section class="stage" aria-labelledby="app-title">
      <header class="topbar">
        <div class="brand">
          <h1 id="app-title">Neon Stopwatch</h1>
          <p class="status" id="status" aria-live="polite">Ready</p>
        </div>
        <div class="mode-tabs" role="group" aria-label="Mode">
          <button class="mode-tab" type="button" data-mode="stopwatch" aria-pressed="true">Stopwatch</button>
          <button class="mode-tab" type="button" data-mode="timer" aria-pressed="false">Timer</button>
        </div>
      </header>

      <section class="time-area" aria-label="Current time">
        <div class="time-ring">
          <div class="time-stack">
            <output class="readout" id="time-display" role="timer" aria-live="polite">00:00.00</output>
            <p class="subreadout" id="subreadout">Lap 0</p>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Controls">
        <button class="control-btn primary" type="button" id="start-stop">Start</button>
        <button class="control-btn ghost" type="button" id="lap-button">Lap</button>
        <button class="control-btn reset" type="button" id="reset-button">Reset</button>
      </section>
    </section>

    <aside class="side-panel" aria-label="Timer settings and lap list">
      <section class="timer-setup" id="timer-setup" aria-labelledby="timer-title" hidden>
        <div class="panel-title">
          <h2 id="timer-title">Countdown</h2>
          <span class="duration-label" id="duration-label">05:00.00</span>
        </div>

        <div class="duration-inputs">
          <label class="field">
            <span>Min</span>
            <input id="minutes-input" inputmode="numeric" type="number" min="0" max="999" value="5" aria-label="Minutes">
          </label>
          <label class="field">
            <span>Sec</span>
            <input id="seconds-input" inputmode="numeric" type="number" min="0" max="59" value="0" aria-label="Seconds">
          </label>
          <button class="set-btn" type="button" id="set-duration">Set</button>
        </div>

        <div class="presets" role="group" aria-label="Countdown presets">
          <button class="preset-btn" type="button" data-preset="60">01:00</button>
          <button class="preset-btn active" type="button" data-preset="300">05:00</button>
          <button class="preset-btn" type="button" data-preset="600">10:00</button>
          <button class="preset-btn" type="button" data-preset="900">15:00</button>
        </div>
      </section>

      <section class="laps-panel" aria-labelledby="laps-title">
        <div class="laps-head" id="laps-title">
          <span>Lap</span>
          <span>Total</span>
          <span>Delta</span>
        </div>
        <ol class="lap-list" id="lap-list" aria-live="polite"></ol>
      </section>
    </aside>
  </main>

  <script>
    const state = {
      mode: 'stopwatch',
      audio: null,
      rafId: 0,
      stopwatch: {
        running: false,
        startedAt: 0,
        elapsed: 0,
        laps: []
      },
      timer: {
        running: false,
        duration: 5 * 60 * 1000,
        remaining: 5 * 60 * 1000,
        endsAt: 0,
        finished: false
      }
    };

    const els = {
      title: document.getElementById('app-title'),
      status: document.getElementById('status'),
      display: document.getElementById('time-display'),
      subreadout: document.getElementById('subreadout'),
      startStop: document.getElementById('start-stop'),
      lap: document.getElementById('lap-button'),
      reset: document.getElementById('reset-button'),
      modeTabs: Array.from(document.querySelectorAll('.mode-tab')),
      timerSetup: document.getElementById('timer-setup'),
      minutes: document.getElementById('minutes-input'),
      seconds: document.getElementById('seconds-input'),
      setDuration: document.getElementById('set-duration'),
      durationLabel: document.getElementById('duration-label'),
      presetButtons: Array.from(document.querySelectorAll('.preset-btn')),
      lapList: document.getElementById('lap-list')
    };

    function now() {
      return performance.now();
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function formatTime(ms) {
      const safeMs = Math.max(0, Math.round(ms));
      const totalCentiseconds = Math.floor(safeMs / 10);
      const centiseconds = totalCentiseconds % 100;
      const totalSeconds = Math.floor(totalCentiseconds / 100);
      const seconds = totalSeconds % 60;
      const totalMinutes = Math.floor(totalSeconds / 60);
      const minutes = totalMinutes % 60;
      const hours = Math.floor(totalMinutes / 60);

      if (hours > 0) {
        return [
          String(hours).padStart(2, '0'),
          String(minutes).padStart(2, '0'),
          String(seconds).padStart(2, '0')
        ].join(':') + '.' + String(centiseconds).padStart(2, '0');
      }

      return String(minutes).padStart(2, '0') + ':' +
        String(seconds).padStart(2, '0') + '.' +
        String(centiseconds).padStart(2, '0');
    }

    function formatPreset(ms) {
      const totalSeconds = Math.round(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    function getStopwatchElapsed(time = now()) {
      if (!state.stopwatch.running) {
        return state.stopwatch.elapsed;
      }
      return state.stopwatch.elapsed + time - state.stopwatch.startedAt;
    }

    function getTimerRemaining(time = now()) {
      if (!state.timer.running) {
        return state.timer.remaining;
      }
      return Math.max(0, state.timer.endsAt - time);
    }

    function ensureAudio() {
      const AudioCtor = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtor) {
        return null;
      }

      try {
        if (!state.audio) {
          state.audio = new AudioCtor();
        }
        if (state.audio.state === 'suspended') {
          state.audio.resume();
        }
        return state.audio;
      } catch (error) {
        return null;
      }
    }

    function playFinishAlarm() {
      const ctx = ensureAudio();
      if (!ctx) {
        return;
      }

      const tones = [
        { frequency: 740, delay: 0, duration: 0.16 },
        { frequency: 988, delay: 0.18, duration: 0.16 },
        { frequency: 1318, delay: 0.36, duration: 0.32 }
      ];

      tones.forEach((tone) => {
        const oscillator = ctx.createOscillator();
        const gain = ctx.createGain();
        const start = ctx.currentTime + 0.025 + tone.delay;
        const end = start + tone.duration;

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(tone.frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.18, start + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, end);
        oscillator.connect(gain);
        gain.connect(ctx.destination);
        oscillator.start(start);
        oscillator.stop(end + 0.02);
      });
    }

    function requestTick() {
      if (state.rafId) {
        return;
      }
      state.rafId = requestAnimationFrame(tick);
    }

    function tick() {
      state.rafId = 0;

      if (state.mode === 'timer' && state.timer.running) {
        const remaining = getTimerRemaining();
        state.timer.remaining = remaining;
        if (remaining <= 0) {
          state.timer.running = false;
          state.timer.remaining = 0;
          state.timer.finished = true;
          playFinishAlarm();
          render();
          return;
        }
      }

      renderTimeOnly();

      if (state.stopwatch.running || state.timer.running) {
        requestTick();
      }
    }

    function renderTimeOnly() {
      const isTimer = state.mode === 'timer';
      const value = isTimer ? getTimerRemaining() : getStopwatchElapsed();

      els.display.textContent = formatTime(value);
      els.display.classList.toggle('warning', isTimer && value > 0 && value <= 30000);
      els.display.classList.toggle('finished', isTimer && state.timer.finished);

      if (isTimer) {
        const duration = state.timer.duration || 1;
        const elapsedPercent = Math.round((1 - value / duration) * 100);
        els.subreadout.textContent = value <= 0 && state.timer.finished ? 'Time is up' : clamp(elapsedPercent, 0, 100) + '% elapsed';
      } else {
        els.subreadout.textContent = 'Lap ' + state.stopwatch.laps.length;
      }
    }

    function renderControls() {
      const isTimer = state.mode === 'timer';
      const active = isTimer ? state.timer.running : state.stopwatch.running;

      els.startStop.classList.toggle('primary', !active);
      els.startStop.classList.toggle('stop', active);
      els.startStop.textContent = active ? (isTimer ? 'Pause' : 'Stop') : (isTimer && state.timer.remaining < state.timer.duration && state.timer.remaining > 0 ? 'Resume' : 'Start');
      els.startStop.setAttribute('aria-label', els.startStop.textContent + ' ' + (isTimer ? 'timer' : 'stopwatch'));

      els.lap.hidden = isTimer;
      els.lap.disabled = isTimer || !state.stopwatch.running;
      els.reset.textContent = 'Reset';
      els.reset.setAttribute('aria-label', 'Reset ' + (isTimer ? 'timer' : 'stopwatch'));
    }

    function renderStatus() {
      if (state.mode === 'stopwatch') {
        els.title.textContent = 'Neon Stopwatch';
        els.status.textContent = state.stopwatch.running ? 'Running' : (state.stopwatch.elapsed > 0 ? 'Stopped' : 'Ready');
        return;
      }

      els.title.textContent = 'Neon Timer';
      if (state.timer.finished) {
        els.status.textContent = "Time's up";
      } else if (state.timer.running) {
        els.status.textContent = 'Counting down';
      } else if (state.timer.remaining < state.timer.duration) {
        els.status.textContent = 'Paused';
      } else {
        els.status.textContent = 'Ready';
      }
    }

    function renderMode() {
      els.modeTabs.forEach((tab) => {
        tab.setAttribute('aria-pressed', String(tab.dataset.mode === state.mode));
      });

      els.timerSetup.hidden = state.mode !== 'timer';
    }

    function renderTimerSetup() {
      const running = state.timer.running;
      const durationSeconds = Math.round(state.timer.duration / 1000);
      const minutes = Math.floor(durationSeconds / 60);
      const seconds = durationSeconds % 60;

      if (document.activeElement !== els.minutes) {
        els.minutes.value = String(minutes);
      }
      if (document.activeElement !== els.seconds) {
        els.seconds.value = String(seconds);
      }

      els.minutes.disabled = running;
      els.seconds.disabled = running;
      els.setDuration.disabled = running;
      els.durationLabel.textContent = formatTime(state.timer.duration);

      els.presetButtons.forEach((button) => {
        const isActive = Number(button.dataset.preset) * 1000 === state.timer.duration;
        button.classList.toggle('active', isActive);
        button.disabled = running;
      });
    }

    function renderLaps() {
      const laps = state.stopwatch.laps;
      els.lapList.replaceChildren();

      if (!laps.length) {
        const empty = document.createElement('li');
        empty.className = 'empty-laps';
        empty.textContent = state.mode === 'timer' ? 'Countdown mode' : 'No laps';
        els.lapList.append(empty);
        return;
      }

      const deltas = laps.map((lap) => lap.delta);
      const fastest = Math.min(...deltas);
      const slowest = Math.max(...deltas);

      laps.slice().reverse().forEach((lap) => {
        const row = document.createElement('li');
        row.className = 'lap-row';
        row.dataset.lapDiff = String(Math.round(lap.delta));
        row.setAttribute('aria-label', 'Lap ' + lap.number + ', total ' + formatTime(lap.total) + ', delta ' + formatTime(lap.delta));

        const index = document.createElement('span');
        index.className = 'lap-index';
        index.textContent = '#' + String(lap.number).padStart(2, '0');

        const total = document.createElement('span');
        total.className = 'lap-total';
        total.textContent = formatTime(lap.total);

        const delta = document.createElement('span');
        delta.className = 'lap-diff';
        delta.textContent = '+' + formatTime(lap.delta);

        if (laps.length > 1 && lap.delta === fastest) {
          delta.classList.add('fastest');
        }
        if (laps.length > 1 && lap.delta === slowest) {
          delta.classList.add('slowest');
        }

        row.append(index, total, delta);
        els.lapList.append(row);
      });
    }

    function render() {
      renderMode();
      renderStatus();
      renderTimeOnly();
      renderControls();
      renderTimerSetup();
      renderLaps();
    }

    function startStopwatch() {
      ensureAudio();
      state.stopwatch.running = true;
      state.stopwatch.startedAt = now();
      state.timer.finished = false;
      render();
      requestTick();
    }

    function stopStopwatch() {
      state.stopwatch.elapsed = getStopwatchElapsed();
      state.stopwatch.running = false;
      render();
    }

    function resetStopwatch() {
      state.stopwatch.running = false;
      state.stopwatch.startedAt = 0;
      state.stopwatch.elapsed = 0;
      state.stopwatch.laps = [];
      render();
    }

    function addLap() {
      if (!state.stopwatch.running) {
        return;
      }

      const total = getStopwatchElapsed();
      const previous = state.stopwatch.laps.length ? state.stopwatch.laps[state.stopwatch.laps.length - 1].total : 0;
      state.stopwatch.laps.push({
        number: state.stopwatch.laps.length + 1,
        total,
        delta: total - previous
      });
      render();
    }

    function startTimer() {
      ensureAudio();

      if (state.timer.remaining <= 0) {
        state.timer.remaining = state.timer.duration;
      }

      state.timer.finished = false;
      state.timer.running = true;
      state.timer.endsAt = now() + state.timer.remaining;
      render();
      requestTick();
    }

    function pauseTimer() {
      state.timer.remaining = getTimerRemaining();
      state.timer.running = false;
      render();
    }

    function resetTimer() {
      state.timer.running = false;
      state.timer.remaining = state.timer.duration;
      state.timer.finished = false;
      render();
    }

    function setTimerDuration(seconds) {
      const safeSeconds = clamp(Math.round(seconds) || 0, 1, 59999);
      state.timer.duration = safeSeconds * 1000;
      state.timer.remaining = state.timer.duration;
      state.timer.finished = false;
      render();
    }

    function applyInputDuration() {
      const minutes = clamp(Number.parseInt(els.minutes.value, 10) || 0, 0, 999);
      const seconds = clamp(Number.parseInt(els.seconds.value, 10) || 0, 0, 59);
      setTimerDuration(minutes * 60 + seconds);
    }

    function pauseCurrentMode() {
      if (state.mode === 'stopwatch' && state.stopwatch.running) {
        stopStopwatch();
      }
      if (state.mode === 'timer' && state.timer.running) {
        pauseTimer();
      }
    }

    function setMode(mode) {
      if (mode === state.mode) {
        return;
      }
      pauseCurrentMode();
      state.mode = mode;
      render();
    }

    els.startStop.addEventListener('click', () => {
      if (state.mode === 'stopwatch') {
        state.stopwatch.running ? stopStopwatch() : startStopwatch();
      } else {
        state.timer.running ? pauseTimer() : startTimer();
      }
    });

    els.lap.addEventListener('click', addLap);

    els.reset.addEventListener('click', () => {
      if (state.mode === 'stopwatch') {
        resetStopwatch();
      } else {
        resetTimer();
      }
    });

    els.modeTabs.forEach((tab) => {
      tab.addEventListener('click', () => setMode(tab.dataset.mode));
    });

    els.setDuration.addEventListener('click', applyInputDuration);

    [els.minutes, els.seconds].forEach((input) => {
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          applyInputDuration();
        }
      });
      input.addEventListener('blur', applyInputDuration);
    });

    els.presetButtons.forEach((button) => {
      button.addEventListener('click', () => {
        setTimerDuration(Number(button.dataset.preset));
      });
    });

    window.addEventListener('keydown', (event) => {
      const tagName = document.activeElement ? document.activeElement.tagName : '';
      if (tagName === 'INPUT') {
        return;
      }

      if (event.code === 'Space') {
        event.preventDefault();
        els.startStop.click();
      }

      if (state.mode === 'stopwatch' && event.code === 'KeyL') {
        addLap();
      }

      if (event.code === 'KeyR') {
        state.mode === 'stopwatch' ? resetStopwatch() : resetTimer();
      }
    });

    render();
  </script>
</body>
</html>
