<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Markdown Editor</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b12;
      --bg-soft: #0d111c;
      --panel: #101523;
      --panel-raised: #141a2b;
      --panel-deep: #0b0f1a;
      --line: rgba(157, 173, 206, 0.17);
      --line-strong: rgba(159, 122, 234, 0.42);
      --text: #eef3ff;
      --text-soft: #c5d0e3;
      --muted: #8c9bb5;
      --faint: #5f6e85;
      --accent: #9b7cff;
      --accent-2: #4dc3ff;
      --accent-3: #7cf0d5;
      --danger: #fb7185;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background:
        linear-gradient(135deg, rgba(155, 124, 255, 0.13), transparent 32%),
        linear-gradient(225deg, rgba(77, 195, 255, 0.1), transparent 36%),
        var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app-shell {
      display: flex;
      min-height: 100vh;
      flex-direction: column;
      padding: 18px;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 58px;
      padding: 0 4px;
      animation: rise-in 420ms ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(155, 124, 255, 0.55);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgba(155, 124, 255, 0.2), rgba(77, 195, 255, 0.12));
      box-shadow: 0 14px 40px rgba(77, 195, 255, 0.14);
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: clamp(1.05rem, 1.8vw, 1.42rem);
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand-text p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .top-actions,
    .format-bar,
    .pane-meta,
    .status-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-actions {
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-grid;
      min-width: 38px;
      height: 36px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 21, 35, 0.86);
      color: var(--text-soft);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
      user-select: none;
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: rgba(77, 195, 255, 0.6);
      background: rgba(77, 195, 255, 0.12);
      color: var(--text);
      box-shadow: 0 10px 30px rgba(77, 195, 255, 0.09);
      transform: translateY(-1px);
      outline: none;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      min-width: auto;
      padding: 0 14px;
      background: linear-gradient(135deg, rgba(155, 124, 255, 0.95), rgba(77, 195, 255, 0.86));
      color: #07101d;
      font-weight: 750;
      box-shadow: 0 18px 34px rgba(77, 195, 255, 0.18);
    }

    .btn.primary:hover,
    .btn.primary:focus-visible {
      border-color: rgba(238, 243, 255, 0.32);
      color: #020617;
      box-shadow: 0 18px 40px rgba(155, 124, 255, 0.24);
    }

    .btn.text {
      display: inline-flex;
      min-width: auto;
      padding: 0 13px;
      gap: 8px;
      font-weight: 700;
    }

    .btn .icon {
      display: block;
      width: 16px;
      height: 16px;
    }

    .layout {
      display: grid;
      flex: 1;
      min-height: 0;
      grid-template-columns: minmax(0, 1fr) 1px minmax(0, 1fr);
      gap: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 11, 19, 0.72);
      box-shadow: var(--shadow);
      animation: rise-in 500ms 70ms ease both;
    }

    .divider {
      background: linear-gradient(180deg, transparent, rgba(155, 124, 255, 0.55), rgba(77, 195, 255, 0.45), transparent);
      opacity: 0.72;
    }

    .pane {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: rgba(16, 21, 35, 0.86);
    }

    .editor-pane {
      border-right: 0;
    }

    .preview-pane {
      background: rgba(12, 17, 29, 0.9);
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 58px;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(13, 17, 28, 0.82);
    }

    .pane-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--text);
      font-weight: 760;
    }

    .pane-title span:first-child {
      display: inline-grid;
      width: 22px;
      height: 22px;
      place-items: center;
      border-radius: 6px;
      background: rgba(155, 124, 255, 0.14);
      color: var(--accent-2);
      font-size: 0.82rem;
      font-weight: 850;
    }

    .format-bar {
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .format-bar .btn {
      width: 34px;
      min-width: 34px;
      height: 32px;
      font-size: 0.9rem;
      font-weight: 760;
    }

    .format-bar .btn[data-action="italic"] {
      font-style: italic;
    }

    .format-bar .btn[data-action="code"],
    .format-bar .btn[data-action="table"] {
      font-family: var(--mono);
      font-weight: 700;
    }

    .editor-wrap,
    .preview-wrap {
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    #editor {
      width: 100%;
      height: 100%;
      min-height: 540px;
      padding: 26px;
      resize: none;
      border: 0;
      outline: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px) 0 28px / 100% 28px,
        var(--panel);
      color: var(--text);
      caret-color: var(--accent-2);
      font-family: var(--mono);
      font-size: 0.96rem;
      line-height: 1.75;
      tab-size: 2;
    }

    #editor::selection {
      background: rgba(77, 195, 255, 0.28);
    }

    .preview-wrap {
      overflow: auto;
      background: var(--panel-deep);
      scroll-behavior: smooth;
    }

    .preview {
      min-height: 100%;
      padding: 30px clamp(22px, 4vw, 46px) 46px;
      color: var(--text-soft);
    }

    .preview.is-updated {
      animation: soft-pulse 260ms ease;
    }

    .pane-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 8px 14px;
      border-top: 1px solid var(--line);
      background: rgba(13, 17, 28, 0.86);
      color: var(--muted);
      font-size: 0.84rem;
    }

    .count-pill,
    .save-state {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 24px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      white-space: nowrap;
    }

    .save-state::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-3);
      box-shadow: 0 0 16px rgba(124, 240, 213, 0.55);
    }

    .save-state.saving::before {
      background: var(--accent-2);
      animation: blink 900ms ease infinite;
    }

    .save-state.error::before {
      background: var(--danger);
      box-shadow: 0 0 16px rgba(251, 113, 133, 0.5);
    }

    .markdown-body {
      max-width: 880px;
      margin: 0 auto;
      font-size: 1rem;
      line-height: 1.78;
    }

    .markdown-body > *:first-child {
      margin-top: 0;
    }

    .markdown-body > *:last-child {
      margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 1.38em 0 0.48em;
      color: var(--text);
      font-weight: 780;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .markdown-body h1 {
      padding-bottom: 0.38em;
      border-bottom: 1px solid rgba(155, 124, 255, 0.26);
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 720;
    }

    .markdown-body h2 {
      font-size: clamp(1.45rem, 3vw, 2.18rem);
    }

    .markdown-body h3 {
      font-size: 1.28rem;
    }

    .markdown-body h4 {
      font-size: 1.1rem;
    }

    .markdown-body h5,
    .markdown-body h6 {
      color: var(--text-soft);
      font-size: 0.98rem;
      text-transform: uppercase;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body table {
      margin: 0 0 1.1em;
    }

    .markdown-body a {
      color: var(--accent-2);
      text-decoration-color: rgba(77, 195, 255, 0.38);
      text-underline-offset: 0.18em;
      transition: color 150ms ease, text-decoration-color 150ms ease;
    }

    .markdown-body a:hover {
      color: var(--accent);
      text-decoration-color: rgba(155, 124, 255, 0.68);
    }

    .markdown-body strong {
      color: var(--text);
      font-weight: 780;
    }

    .markdown-body em {
      color: #dbe6ff;
    }

    .markdown-body code {
      border: 1px solid rgba(77, 195, 255, 0.18);
      border-radius: 6px;
      background: rgba(77, 195, 255, 0.09);
      color: #dff6ff;
      font-family: var(--mono);
      font-size: 0.9em;
      padding: 0.12em 0.34em;
    }

    .markdown-body pre {
      overflow: auto;
      border: 1px solid rgba(155, 124, 255, 0.22);
      border-radius: var(--radius);
      background: #070b14;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .markdown-body pre code {
      display: block;
      min-width: max-content;
      border: 0;
      background: transparent;
      color: #dce8ff;
      font-size: 0.9rem;
      line-height: 1.7;
      padding: 18px;
    }

    .markdown-body blockquote {
      position: relative;
      padding: 14px 18px 14px 22px;
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: linear-gradient(90deg, rgba(155, 124, 255, 0.13), rgba(77, 195, 255, 0.05));
      color: #d7def0;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.35em;
    }

    .markdown-body li {
      margin: 0.28em 0;
      padding-left: 0.18em;
    }

    .markdown-body li::marker {
      color: var(--accent-2);
    }

    .markdown-body hr {
      height: 1px;
      margin: 2em 0;
      border: 0;
      background: linear-gradient(90deg, transparent, rgba(155, 124, 255, 0.54), rgba(77, 195, 255, 0.44), transparent);
    }

    .markdown-body table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      border-spacing: 0;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid rgba(157, 173, 206, 0.18);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }

    .markdown-body th {
      background: rgba(155, 124, 255, 0.12);
      color: var(--text);
      font-weight: 760;
    }

    .markdown-body tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.026);
    }

    .markdown-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 1.2em auto;
      border: 1px solid rgba(157, 173, 206, 0.18);
      border-radius: var(--radius);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    .markdown-body .task-list {
      padding-left: 0;
      list-style: none;
    }

    .markdown-body .task-list input {
      margin-right: 0.55em;
      accent-color: var(--accent);
    }

    @media (max-width: 1080px) {
      .format-bar .btn {
        width: 32px;
        min-width: 32px;
      }

      #editor {
        padding: 22px;
      }
    }

    @media (max-width: 820px) {
      .app-shell {
        min-height: 100svh;
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
      }

      .top-actions {
        width: 100%;
        justify-content: stretch;
      }

      .top-actions .btn.text,
      .top-actions .btn.primary {
        flex: 1 1 auto;
        justify-content: center;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 52svh) 1px minmax(420px, 52svh);
      }

      .divider {
        background: linear-gradient(90deg, transparent, rgba(155, 124, 255, 0.55), rgba(77, 195, 255, 0.45), transparent);
      }

      .pane-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .format-bar {
        width: 100%;
        justify-content: flex-start;
      }

      #editor {
        min-height: 420px;
        padding: 18px;
        font-size: 0.92rem;
      }

      .preview {
        padding: 22px 18px 34px;
      }

      .pane-footer {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 520px) {
      .brand-text p {
        display: none;
      }

      .layout {
        border-radius: 0;
      }

      .count-pill {
        font-size: 0.78rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes soft-pulse {
      from {
        opacity: 0.76;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes blink {
      50% {
        opacity: 0.35;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand" aria-label="Markdown Editor">
        <div class="brand-mark">M</div>
        <div class="brand-text">
          <h1>Markdown Editor</h1>
          <p id="documentMeta">Unsaved document</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn text" id="newDocBtn" type="button" title="New document" aria-label="New document">New</button>
        <button class="btn text" id="saveBtn" type="button" title="Save" aria-label="Save">Save</button>
        <button class="btn primary" id="exportBtn" type="button" title="Export HTML" aria-label="Export HTML">Export HTML</button>
      </div>
    </header>

    <main class="layout" aria-label="Markdown editor and live preview">
      <section class="pane editor-pane">
        <div class="pane-header">
          <div class="pane-title"><span>MD</span><span>Editor</span></div>
          <div class="format-bar" aria-label="Formatting controls">
            <button class="btn" type="button" data-action="heading" title="Heading" aria-label="Heading">H</button>
            <button class="btn" type="button" data-action="bold" title="Bold" aria-label="Bold">B</button>
            <button class="btn" type="button" data-action="italic" title="Italic" aria-label="Italic">I</button>
            <button class="btn" type="button" data-action="code" title="Inline code" aria-label="Inline code">`</button>
            <button class="btn" type="button" data-action="quote" title="Blockquote" aria-label="Blockquote">&gt;</button>
            <button class="btn" type="button" data-action="list" title="Bulleted list" aria-label="Bulleted list">-</button>
            <button class="btn" type="button" data-action="ordered" title="Numbered list" aria-label="Numbered list">1.</button>
            <button class="btn" type="button" data-action="link" title="Link" aria-label="Link">[]</button>
            <button class="btn" type="button" data-action="image" title="Image" aria-label="Image">img</button>
            <button class="btn" type="button" data-action="table" title="Table" aria-label="Table">|</button>
          </div>
        </div>
        <div class="editor-wrap">
          <textarea id="editor" spellcheck="true" autocomplete="off" aria-label="Markdown source"></textarea>
        </div>
        <div class="pane-footer">
          <div class="status-line">
            <span class="count-pill"><strong id="wordCount">0</strong> words</span>
            <span class="count-pill"><strong id="charCount">0</strong> chars</span>
          </div>
          <span class="save-state" id="saveState">Saved</span>
        </div>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="pane preview-pane">
        <div class="pane-header">
          <div class="pane-title"><span>HTML</span><span>Preview</span></div>
          <div class="pane-meta">
            <span class="count-pill" id="readTime">1 min read</span>
          </div>
        </div>
        <div class="preview-wrap" id="previewScroll">
          <article class="preview markdown-body" id="preview" aria-live="polite"></article>
        </div>
        <div class="pane-footer">
          <span id="renderState">Rendered</span>
          <span id="inputState">Ready</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      "use strict";

      const STORAGE_KEY = "markdown-editor.autosave.v1";
      const META_KEY = "markdown-editor.meta.v1";
      const DEFAULT_MARKDOWN = [
        "# A Clean Markdown Workspace",
        "",
        "Write on the left. The preview on the right updates as you type.",
        "",
        "## Markdown Coverage",
        "",
        "- **Bold** text and *italic* text",
        "- `Inline code` and fenced code blocks",
        "- Links like [a local section](#markdown-coverage) and images",
        "- Blockquotes, lists, tables, and horizontal rules",
        "",
        "> Good notes feel calm, fast, and deliberate.",
        "",
        "```js",
        "function greet(name) {",
        "  return `Hello, ${name}.`;",
        "}",
        "```",
        "",
        "| Feature | Status |",
        "| --- | ---: |",
        "| Live preview | Ready |",
        "| Auto-save | Ready |",
        "| HTML export | Ready |",
        "",
        "![A self-contained preview image](data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5NjAiIGhlaWdodD0iNDIwIiB2aWV3Qm94PSIwIDAgOTYwIDQyMCI+PHJlY3Qgd2lkdGg9Ijk2MCIgaGVpZ2h0PSI0MjAiIGZpbGw9IiMxMDE1MjMiLz48cGF0aCBkPSJNMCAyODAgQzE4MCAyMjAgMjQwIDM0MCA0MjAgMjYwIFM3MDAgMTEwIDk2MCAxODAgVjQyMCBIMCBaIiBmaWxsPSIjNGRjM2ZmIiBvcGFjaXR5PSIuMzIiLz48cGF0aCBkPSJNMCAxMjAgQzE4MCA3MCAzMDAgMTYwIDQ2MCAxMTAgUzcyMCAyMCA5NjAgOTAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzliN2NmZiIgc3Ryb2tlLXdpZHRoPSIxMiIgb3BhY2l0eT0iLjciLz48dGV4dCB4PSI2NCIgeT0iMjQwIiBmaWxsPSIjZWVmM2ZmIiBmb250LWZhbWlseT0iQXJpYWwsc2Fucy1zZXJpZiIgZm9udC1zaXplPSI0NiIgZm9udC13ZWlnaHQ9IjcwMCI+SW1hZ2UgcHJldmlldzwvdGV4dD48L3N2Zz4=)",
        "",
        "---",
        "",
        "Start typing to replace this draft."
      ].join("\n");

      const editor = document.getElementById("editor");
      const preview = document.getElementById("preview");
      const wordCount = document.getElementById("wordCount");
      const charCount = document.getElementById("charCount");
      const saveState = document.getElementById("saveState");
      const readTime = document.getElementById("readTime");
      const renderState = document.getElementById("renderState");
      const documentMeta = document.getElementById("documentMeta");
      const saveBtn = document.getElementById("saveBtn");
      const exportBtn = document.getElementById("exportBtn");
      const newDocBtn = document.getElementById("newDocBtn");
      const formatButtons = document.querySelectorAll("[data-action]");

      let saveTimer = 0;
      let renderTimer = 0;
      let lastSavedAt = null;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function sanitizeUrl(value) {
        const trimmed = String(value || "").trim().replace(/^<|>$/g, "");
        if (!trimmed) return "";
        if (/^(https?:|mailto:|tel:|data:image\/(?:png|gif|jpeg|jpg|webp|svg\+xml);base64,|#|\/|\.\/|\.\.\/)/i.test(trimmed)) {
          return trimmed;
        }
        return "";
      }

      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/<[^>]*>/g, "")
          .replace(/&[a-z0-9#]+;/gi, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "")
          .slice(0, 72) || "section";
      }

      function renderInline(raw) {
        const codeTokens = [];
        let text = String(raw).replace(/`([^`]+)`/g, function (_, code) {
          const token = "\u0000CODE" + codeTokens.length + "\u0000";
          codeTokens.push("<code>" + escapeHtml(code) + "</code>");
          return token;
        });

        let html = escapeHtml(text);

        html = html.replace(/!\[([^\]]*)\]\(([^)\s]+)(?:\s+&quot;([^&]*)&quot;)?\)/g, function (_, alt, url, title) {
          const safeUrl = sanitizeUrl(url);
          if (!safeUrl) return "";
          const titleAttr = title ? " title=\"" + title + "\"" : "";
          return "<img src=\"" + escapeHtml(safeUrl) + "\" alt=\"" + alt + "\"" + titleAttr + " loading=\"lazy\">";
        });

        html = html.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+&quot;([^&]*)&quot;)?\)/g, function (_, label, url, title) {
          const safeUrl = sanitizeUrl(url);
          if (!safeUrl) return label;
          const external = /^(https?:)?\/\//i.test(safeUrl);
          const target = external ? " target=\"_blank\" rel=\"noopener noreferrer\"" : "";
          const titleAttr = title ? " title=\"" + title + "\"" : "";
          return "<a href=\"" + escapeHtml(safeUrl) + "\"" + titleAttr + target + ">" + label + "</a>";
        });

        html = html.replace(/(\*\*|__)(.+?)\1/g, "<strong>$2</strong>");
        html = html.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
        html = html.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, "$1<em>$2</em>");
        html = html.replace(/~~(.+?)~~/g, "<s>$1</s>");
        html = html.replace(/&lt;(https?:\/\/[^&\s]+)&gt;/g, function (_, url) {
          return "<a href=\"" + escapeHtml(url) + "\" target=\"_blank\" rel=\"noopener noreferrer\">" + url + "</a>";
        });

        codeTokens.forEach(function (code, index) {
          html = html.replace(new RegExp("\\u0000CODE" + index + "\\u0000", "g"), code);
        });

        return html;
      }

      function parseTableRow(line) {
        let value = line.trim();
        if (value.startsWith("|")) value = value.slice(1);
        if (value.endsWith("|")) value = value.slice(0, -1);
        return value.split("|").map(function (cell) {
          return cell.trim();
        });
      }

      function isTableDivider(line) {
        return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
      }

      function renderTable(lines) {
        const header = parseTableRow(lines[0]);
        const divider = parseTableRow(lines[1]);
        const rows = lines.slice(2).map(parseTableRow);
        const alignments = divider.map(function (cell) {
          const left = cell.startsWith(":");
          const right = cell.endsWith(":");
          if (left && right) return "center";
          if (right) return "right";
          return "left";
        });

        const thead = "<thead><tr>" + header.map(function (cell, index) {
          return "<th style=\"text-align:" + alignments[index % alignments.length] + "\">" + renderInline(cell) + "</th>";
        }).join("") + "</tr></thead>";

        const tbody = "<tbody>" + rows.map(function (row) {
          return "<tr>" + header.map(function (_, index) {
            const cell = row[index] || "";
            return "<td style=\"text-align:" + alignments[index % alignments.length] + "\">" + renderInline(cell) + "</td>";
          }).join("") + "</tr>";
        }).join("") + "</tbody>";

        return "<table>" + thead + tbody + "</table>";
      }

      function renderList(lines) {
        const first = lines[0].match(/^\s*((?:[-*+])|(?:\d+[.)]))\s+(.*)$/);
        const ordered = first && /\d/.test(first[1]);
        const tag = ordered ? "ol" : "ul";
        let isTaskList = false;
        const items = lines.map(function (line) {
          const match = line.match(/^\s*((?:[-*+])|(?:\d+[.)]))\s+(.*)$/);
          let content = match ? match[2] : line.trim();
          const task = content.match(/^\[( |x|X)\]\s+(.*)$/);
          if (task) {
            isTaskList = true;
            const checked = task[1].toLowerCase() === "x" ? " checked" : "";
            content = "<input type=\"checkbox\" disabled" + checked + "> " + renderInline(task[2]);
          } else {
            content = renderInline(content);
          }
          return "<li>" + content + "</li>";
        }).join("");
        const listClass = isTaskList ? " class=\"task-list\"" : "";
        return "<" + tag + listClass + ">" + items + "</" + tag + ">";
      }

      function renderMarkdown(source) {
        const lines = String(source || "").replace(/\r\n?/g, "\n").split("\n");
        const blocks = [];
        let i = 0;

        while (i < lines.length) {
          const line = lines[i];

          if (!line.trim()) {
            i += 1;
            continue;
          }

          const fence = line.match(/^\s*(```+|~~~+)\s*([\w-]*)\s*$/);
          if (fence) {
            const marker = fence[1];
            const language = fence[2] ? " class=\"language-" + escapeHtml(fence[2]) + "\"" : "";
            const code = [];
            i += 1;
            while (i < lines.length && !lines[i].trim().startsWith(marker)) {
              code.push(lines[i]);
              i += 1;
            }
            if (i < lines.length) i += 1;
            blocks.push("<pre><code" + language + ">" + escapeHtml(code.join("\n")) + "</code></pre>");
            continue;
          }

          if (/^\s{0,3}([-*_])(?:\s*\1){2,}\s*$/.test(line)) {
            blocks.push("<hr>");
            i += 1;
            continue;
          }

          if (/^\s{0,3}#{1,6}\s+/.test(line)) {
            const match = line.match(/^\s{0,3}(#{1,6})\s+(.+?)\s*#*\s*$/);
            const level = match[1].length;
            const content = renderInline(match[2]);
            const id = slugify(content);
            blocks.push("<h" + level + " id=\"" + id + "\">" + content + "</h" + level + ">");
            i += 1;
            continue;
          }

          if (/^\s{0,3}>\s?/.test(line)) {
            const quote = [];
            while (i < lines.length && /^\s{0,3}>\s?/.test(lines[i])) {
              quote.push(lines[i].replace(/^\s{0,3}>\s?/, ""));
              i += 1;
            }
            blocks.push("<blockquote>" + renderMarkdown(quote.join("\n")) + "</blockquote>");
            continue;
          }

          if (i + 1 < lines.length && /\|/.test(line) && isTableDivider(lines[i + 1])) {
            const tableLines = [line, lines[i + 1]];
            i += 2;
            while (i < lines.length && /\|/.test(lines[i]) && lines[i].trim()) {
              tableLines.push(lines[i]);
              i += 1;
            }
            blocks.push(renderTable(tableLines));
            continue;
          }

          if (/^\s*((?:[-*+])|(?:\d+[.)]))\s+/.test(line)) {
            const listLines = [];
            while (i < lines.length && /^\s*((?:[-*+])|(?:\d+[.)]))\s+/.test(lines[i])) {
              listLines.push(lines[i]);
              i += 1;
            }
            blocks.push(renderList(listLines));
            continue;
          }

          const paragraph = [line.trim()];
          i += 1;
          while (
            i < lines.length &&
            lines[i].trim() &&
            !/^\s*(```+|~~~+)/.test(lines[i]) &&
            !/^\s{0,3}#{1,6}\s+/.test(lines[i]) &&
            !/^\s{0,3}>\s?/.test(lines[i]) &&
            !/^\s*((?:[-*+])|(?:\d+[.)]))\s+/.test(lines[i]) &&
            !(i + 1 < lines.length && /\|/.test(lines[i]) && isTableDivider(lines[i + 1]))
          ) {
            paragraph.push(lines[i].trim());
            i += 1;
          }
          blocks.push("<p>" + renderInline(paragraph.join(" ")) + "</p>");
        }

        return blocks.join("\n");
      }

      function countWords(value) {
        const words = String(value).trim().match(/\b[\w'-]+\b/g);
        return words ? words.length : 0;
      }

      function updateStats() {
        const text = editor.value;
        const words = countWords(text);
        wordCount.textContent = String(words);
        charCount.textContent = String(text.length);
        readTime.textContent = Math.max(1, Math.ceil(words / 225)) + " min read";
      }

      function updateMeta() {
        if (!lastSavedAt) {
          documentMeta.textContent = "Autosave ready";
          return;
        }
        documentMeta.textContent = "Saved " + lastSavedAt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }

      function setSaveState(label, mode) {
        saveState.textContent = label;
        saveState.classList.toggle("saving", mode === "saving");
        saveState.classList.toggle("error", mode === "error");
      }

      function saveNow() {
        try {
          localStorage.setItem(STORAGE_KEY, editor.value);
          lastSavedAt = new Date();
          localStorage.setItem(META_KEY, String(lastSavedAt.getTime()));
          setSaveState("Saved", "saved");
          updateMeta();
        } catch (error) {
          setSaveState("Save blocked", "error");
        }
      }

      function scheduleSave() {
        setSaveState("Saving", "saving");
        window.clearTimeout(saveTimer);
        saveTimer = window.setTimeout(saveNow, 260);
      }

      function renderNow() {
        preview.innerHTML = renderMarkdown(editor.value);
        preview.classList.remove("is-updated");
        void preview.offsetWidth;
        preview.classList.add("is-updated");
        renderState.textContent = "Rendered " + new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        updateStats();
      }

      function scheduleRender() {
        window.clearTimeout(renderTimer);
        renderTimer = window.setTimeout(renderNow, 40);
      }

      function insertText(replacement, startOffset, endOffset) {
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const value = editor.value;
        editor.value = value.slice(0, start) + replacement + value.slice(end);
        const nextStart = start + (startOffset || 0);
        const nextEnd = start + replacement.length - (endOffset || 0);
        editor.setSelectionRange(nextStart, nextEnd);
        editor.focus();
        onInput();
      }

      function wrapSelection(before, after, placeholder) {
        const selected = editor.value.slice(editor.selectionStart, editor.selectionEnd) || placeholder;
        insertText(before + selected + after, before.length, after.length);
      }

      function prefixSelectedLines(prefix) {
        const value = editor.value;
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const lineStart = value.lastIndexOf("\n", start - 1) + 1;
        const lineEndIndex = value.indexOf("\n", end);
        const lineEnd = lineEndIndex === -1 ? value.length : lineEndIndex;
        const chunk = value.slice(lineStart, lineEnd);
        const lines = chunk.split("\n");
        const next = lines.map(function (line) {
          return line.startsWith(prefix) ? line : prefix + line;
        }).join("\n");
        editor.value = value.slice(0, lineStart) + next + value.slice(lineEnd);
        editor.setSelectionRange(lineStart, lineStart + next.length);
        editor.focus();
        onInput();
      }

      function indentSelection(remove) {
        const value = editor.value;
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        const lineStart = value.lastIndexOf("\n", start - 1) + 1;
        const lineEndIndex = value.indexOf("\n", end);
        const lineEnd = lineEndIndex === -1 ? value.length : lineEndIndex;
        const chunk = value.slice(lineStart, lineEnd);
        const next = chunk.split("\n").map(function (line) {
          if (remove) return line.replace(/^( {1,2}|\t)/, "");
          return "  " + line;
        }).join("\n");
        editor.value = value.slice(0, lineStart) + next + value.slice(lineEnd);
        editor.setSelectionRange(lineStart, lineStart + next.length);
        editor.focus();
        onInput();
      }

      function insertLink() {
        const selected = editor.value.slice(editor.selectionStart, editor.selectionEnd) || "link text";
        const url = window.prompt("URL", "https://");
        if (!url) return;
        insertText("[" + selected + "](" + url + ")", 1, url.length + 3);
      }

      function insertImage() {
        const alt = editor.value.slice(editor.selectionStart, editor.selectionEnd) || "image description";
        const url = window.prompt("Image URL", "https://");
        if (!url) return;
        insertText("![" + alt + "](" + url + ")", 2, url.length + 3);
      }

      function insertTable() {
        const table = [
          "| Column | Value |",
          "| --- | ---: |",
          "| Item | 42 |"
        ].join("\n");
        insertText(table, 0, 0);
      }

      function runAction(action) {
        const actions = {
          heading: function () { prefixSelectedLines("## "); },
          bold: function () { wrapSelection("**", "**", "bold text"); },
          italic: function () { wrapSelection("*", "*", "italic text"); },
          code: function () { wrapSelection("`", "`", "code"); },
          quote: function () { prefixSelectedLines("> "); },
          list: function () { prefixSelectedLines("- "); },
          ordered: function () { prefixSelectedLines("1. "); },
          link: insertLink,
          image: insertImage,
          table: insertTable
        };
        if (actions[action]) actions[action]();
      }

      function exportHtml() {
        const rendered = renderMarkdown(editor.value);
        const exportedAt = new Date().toLocaleString();
        const html = "<!doctype html>\n" +
          "<html lang=\"en\">\n" +
          "<head>\n" +
          "  <meta charset=\"utf-8\">\n" +
          "  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n" +
          "  <title>Markdown Export</title>\n" +
          "  <style>\n" + exportStyles() + "\n  </style>\n" +
          "</head>\n" +
          "<body>\n" +
          "  <main class=\"markdown-body\">\n" +
          rendered +
          "\n  </main>\n" +
          "  <footer>Exported " + escapeHtml(exportedAt) + "</footer>\n" +
          "</body>\n" +
          "</html>\n";

        const blob = new Blob([html], { type: "text/html;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const stamp = new Date().toISOString().slice(0, 10);
        link.href = url;
        link.download = "markdown-export-" + stamp + ".html";
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(function () {
          URL.revokeObjectURL(url);
        }, 400);
      }

      function exportStyles() {
        return [
          ":root{color-scheme:dark;--bg:#090b12;--text:#eef3ff;--soft:#c5d0e3;--line:rgba(157,173,206,.2);--accent:#9b7cff;--accent2:#4dc3ff;--mono:SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace;--serif:ui-serif,Georgia,Cambria,Times New Roman,Times,serif;}",
          "body{margin:0;background:var(--bg);color:var(--soft);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;}",
          ".markdown-body{max-width:880px;margin:0 auto;padding:42px 24px 60px;font-size:1.05rem;line-height:1.78;}",
          ".markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4,.markdown-body h5,.markdown-body h6{color:var(--text);line-height:1.16;letter-spacing:0;margin:1.38em 0 .48em;font-weight:780;}",
          ".markdown-body h1{font-family:var(--serif);font-size:clamp(2rem,5vw,3.4rem);font-weight:720;padding-bottom:.38em;border-bottom:1px solid rgba(155,124,255,.28);}",
          ".markdown-body h2{font-size:clamp(1.45rem,3vw,2.18rem);}.markdown-body h3{font-size:1.28rem;}",
          ".markdown-body a{color:var(--accent2);text-decoration-color:rgba(77,195,255,.38);text-underline-offset:.18em;}.markdown-body strong{color:var(--text);font-weight:780;}",
          ".markdown-body code{border:1px solid rgba(77,195,255,.18);border-radius:6px;background:rgba(77,195,255,.09);color:#dff6ff;font-family:var(--mono);font-size:.9em;padding:.12em .34em;}",
          ".markdown-body pre{overflow:auto;border:1px solid rgba(155,124,255,.22);border-radius:8px;background:#070b14;}.markdown-body pre code{display:block;border:0;background:transparent;color:#dce8ff;line-height:1.7;padding:18px;}",
          ".markdown-body blockquote{padding:14px 18px 14px 22px;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;background:linear-gradient(90deg,rgba(155,124,255,.13),rgba(77,195,255,.05));color:#d7def0;}",
          ".markdown-body table{display:block;width:100%;overflow-x:auto;border-collapse:collapse;border-spacing:0;}.markdown-body th,.markdown-body td{border:1px solid var(--line);padding:10px 12px;text-align:left;vertical-align:top;}.markdown-body th{background:rgba(155,124,255,.12);color:var(--text);}",
          ".markdown-body img{display:block;max-width:100%;height:auto;margin:1.2em auto;border:1px solid var(--line);border-radius:8px;box-shadow:0 18px 44px rgba(0,0,0,.28);}",
          ".markdown-body hr{height:1px;margin:2em 0;border:0;background:linear-gradient(90deg,transparent,rgba(155,124,255,.54),rgba(77,195,255,.44),transparent);}footer{max-width:880px;margin:0 auto 28px;padding:0 24px;color:#7f8ca4;font-size:.85rem;}"
        ].join("\n");
      }

      function handleShortcuts(event) {
        const mod = event.metaKey || event.ctrlKey;

        if (event.key === "Tab" && document.activeElement === editor) {
          event.preventDefault();
          indentSelection(event.shiftKey);
          return;
        }

        if (!mod) return;

        const key = event.key.toLowerCase();
        if (key === "s") {
          event.preventDefault();
          saveNow();
        } else if (key === "b") {
          event.preventDefault();
          runAction("bold");
        } else if (key === "i") {
          event.preventDefault();
          runAction("italic");
        } else if (key === "k") {
          event.preventDefault();
          runAction("link");
        } else if (key === "e" && event.shiftKey) {
          event.preventDefault();
          exportHtml();
        } else if (key === "`" && event.shiftKey) {
          event.preventDefault();
          insertText("```\n" + (editor.value.slice(editor.selectionStart, editor.selectionEnd) || "code") + "\n```", 4, 4);
        }
      }

      function onInput() {
        scheduleRender();
        scheduleSave();
      }

      function hydrate() {
        let initial = DEFAULT_MARKDOWN;
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          const savedMeta = localStorage.getItem(META_KEY);
          if (saved !== null) initial = saved;
          if (savedMeta) lastSavedAt = new Date(Number(savedMeta));
        } catch (error) {
          setSaveState("Storage blocked", "error");
        }
        editor.value = initial;
        renderNow();
        updateMeta();
      }

      editor.addEventListener("input", onInput);
      document.addEventListener("keydown", handleShortcuts);

      saveBtn.addEventListener("click", saveNow);
      exportBtn.addEventListener("click", exportHtml);
      newDocBtn.addEventListener("click", function () {
        if (editor.value.trim() && !window.confirm("Start a new document? The current draft remains saved until you type again.")) {
          return;
        }
        editor.value = "# Untitled\n\n";
        editor.focus();
        onInput();
      });

      formatButtons.forEach(function (button) {
        button.addEventListener("mousedown", function (event) {
          event.preventDefault();
        });
        button.addEventListener("click", function () {
          runAction(button.dataset.action);
        });
      });

      hydrate();
    })();
  </script>
</body>
</html>
