<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON Tool</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070c;
      --bg-grid: rgba(111, 255, 233, 0.055);
      --panel: rgba(10, 15, 26, 0.88);
      --panel-deep: #070b14;
      --panel-raised: #0f1727;
      --line: rgba(148, 163, 184, 0.18);
      --line-hot: rgba(111, 255, 233, 0.55);
      --text: #eff7ff;
      --text-soft: #b9c8d8;
      --muted: #74859a;
      --faint: #4f6075;
      --cyan: #6fffe9;
      --pink: #ff4fd8;
      --lime: #c6ff4a;
      --amber: #ffd166;
      --danger: #ff5d7a;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.48);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px),
        linear-gradient(135deg, rgba(111, 255, 233, 0.08), transparent 32%),
        linear-gradient(225deg, rgba(255, 79, 216, 0.08), transparent 34%),
        var(--bg);
      background-size: 48px 48px, 48px 48px, auto, auto, auto;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .app {
      display: grid;
      min-height: 100vh;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 0 4px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(111, 255, 233, 0.5);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(111, 255, 233, 0.18), rgba(255, 79, 216, 0.12)),
        var(--panel-deep);
      box-shadow: 0 0 28px rgba(111, 255, 233, 0.12);
      color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-copy {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.08rem, 1.8vw, 1.48rem);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .actions,
    .pane-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 36px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(15, 23, 39, 0.88);
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 720;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease, box-shadow 150ms ease;
      user-select: none;
      white-space: nowrap;
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: rgba(111, 255, 233, 0.62);
      background: rgba(111, 255, 233, 0.1);
      color: var(--text);
      box-shadow: 0 10px 26px rgba(111, 255, 233, 0.08);
      outline: none;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      border-color: rgba(198, 255, 74, 0.55);
      background: linear-gradient(135deg, rgba(198, 255, 74, 0.95), rgba(111, 255, 233, 0.86));
      color: #061012;
      box-shadow: 0 16px 36px rgba(198, 255, 74, 0.12);
    }

    .btn.danger:hover,
    .btn.danger:focus-visible {
      border-color: rgba(255, 93, 122, 0.7);
      background: rgba(255, 93, 122, 0.12);
      box-shadow: 0 10px 26px rgba(255, 93, 122, 0.08);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 14px;
      min-height: 0;
    }

    .pane {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), rgba(255, 255, 255, 0.012)),
        var(--panel);
      box-shadow: var(--shadow);
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 11, 20, 0.64);
    }

    .pane-title {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 9px;
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pulse {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 18px rgba(116, 133, 154, 0.34);
    }

    .pulse.ok {
      background: var(--lime);
      box-shadow: 0 0 18px rgba(198, 255, 74, 0.36);
    }

    .pulse.bad {
      background: var(--danger);
      box-shadow: 0 0 18px rgba(255, 93, 122, 0.38);
    }

    .badge {
      min-width: 86px;
      padding: 6px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
      text-align: center;
      white-space: nowrap;
    }

    .badge.ok {
      border-color: rgba(198, 255, 74, 0.4);
      color: var(--lime);
      background: rgba(198, 255, 74, 0.08);
    }

    .badge.bad {
      border-color: rgba(255, 93, 122, 0.42);
      color: var(--danger);
      background: rgba(255, 93, 122, 0.08);
    }

    .editor-shell {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      background: rgba(5, 8, 15, 0.72);
    }

    textarea {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: none;
      padding: 18px 18px 18px 72px;
      background: transparent;
      color: var(--text);
      caret-color: var(--cyan);
      font-family: var(--mono);
      font-size: 0.92rem;
      line-height: 1.55;
      tab-size: 2;
      white-space: pre;
      overflow: auto;
    }

    textarea::placeholder {
      color: var(--faint);
    }

    .line-gutter {
      position: absolute;
      inset: 0 auto 0 0;
      z-index: 3;
      width: 54px;
      overflow: hidden;
      border-right: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(7, 11, 20, 0.72);
      pointer-events: none;
    }

    .line-gutter-inner {
      padding-top: 18px;
      padding-right: 10px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 0.92rem;
      line-height: 1.55;
      text-align: right;
      will-change: transform;
    }

    .line-gutter span {
      display: block;
      height: 1.55em;
    }

    .line-gutter span.error {
      color: var(--danger);
      text-shadow: 0 0 14px rgba(255, 93, 122, 0.45);
    }

    .error-line-overlay {
      position: absolute;
      left: 54px;
      right: 0;
      z-index: 1;
      border-top: 1px solid rgba(255, 93, 122, 0.28);
      border-bottom: 1px solid rgba(255, 93, 122, 0.22);
      background: rgba(255, 93, 122, 0.12);
      pointer-events: none;
    }

    .error-panel,
    .empty-tree {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .error-panel {
      display: grid;
      gap: 4px;
      min-height: 58px;
      padding: 11px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255, 93, 122, 0.07);
    }

    .error-panel[hidden] {
      display: none;
    }

    .error-kicker {
      color: var(--danger);
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .error-message {
      color: var(--text-soft);
      font-family: var(--mono);
      font-size: 0.82rem;
      overflow-wrap: anywhere;
    }

    .tree-shell {
      min-height: 0;
      overflow: auto;
      padding: 14px;
      background: rgba(5, 8, 15, 0.72);
    }

    .tree {
      display: grid;
      gap: 4px;
      min-width: max-content;
      font-family: var(--mono);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .empty-tree {
      display: grid;
      min-height: 220px;
      place-items: center;
      border: 1px dashed rgba(148, 163, 184, 0.22);
      border-radius: var(--radius);
      color: var(--faint);
      text-align: center;
    }

    details {
      min-width: 0;
    }

    summary {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      cursor: pointer;
      list-style: none;
      outline: none;
      border-radius: 6px;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      display: inline-grid;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid rgba(111, 255, 233, 0.2);
      border-radius: 5px;
      color: var(--cyan);
      content: "+";
      font-size: 0.78rem;
      line-height: 1;
    }

    details[open] > summary::before {
      content: "-";
    }

    summary:hover,
    summary:focus-visible,
    .leaf:hover {
      background: rgba(111, 255, 233, 0.06);
    }

    .children {
      margin-left: 24px;
      padding-left: 12px;
      border-left: 1px solid rgba(148, 163, 184, 0.14);
    }

    .leaf {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-height: 28px;
      border-radius: 6px;
      white-space: nowrap;
    }

    .key {
      color: var(--cyan);
      font-weight: 720;
    }

    .index {
      color: var(--amber);
    }

    .type {
      padding: 2px 6px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
    }

    .value.string {
      color: var(--lime);
    }

    .value.number {
      color: var(--amber);
    }

    .value.boolean {
      color: var(--pink);
    }

    .value.null {
      color: var(--muted);
      font-style: italic;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      background: rgba(7, 11, 20, 0.64);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.74rem;
    }

    .footer strong {
      color: var(--text-soft);
      font-weight: 720;
    }

    @media (max-width: 980px) {
      .app {
        padding: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr);
      }

      .editor-shell {
        min-height: 420px;
      }
    }

    @media (max-width: 560px) {
      .topbar,
      .pane-head,
      .footer {
        gap: 10px;
      }

      .pane-head,
      .footer {
        align-items: flex-start;
        flex-direction: column;
      }

      .pane-actions {
        justify-content: flex-start;
      }

      .btn {
        height: 34px;
        padding: 0 10px;
        font-size: 0.8rem;
      }

      textarea {
        padding-left: 62px;
        font-size: 0.84rem;
      }

      .line-gutter {
        width: 48px;
      }

      .line-gutter-inner {
        padding-right: 8px;
        font-size: 0.84rem;
      }

      .error-line-overlay {
        left: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">{ }</div>
        <div class="brand-copy">
          <h1>JSON Tool</h1>
          <p class="meta" id="docMeta">0 bytes / 1 line / 0 nodes</p>
        </div>
      </div>
      <div class="actions" aria-label="JSON actions">
        <button class="btn primary" id="formatBtn" type="button">Format</button>
        <button class="btn" id="minifyBtn" type="button">Minify</button>
        <button class="btn" id="copyBtn" type="button">Copy</button>
        <button class="btn" id="sampleBtn" type="button">Sample</button>
        <button class="btn danger" id="clearBtn" type="button">Clear</button>
      </div>
    </header>

    <section class="workspace" aria-label="JSON workspace">
      <section class="pane" aria-labelledby="inputTitle">
        <div class="pane-head">
          <div class="pane-title" id="inputTitle">
            <span class="pulse" id="statusPulse" aria-hidden="true"></span>
            <span>Input</span>
          </div>
          <span class="badge" id="statusBadge" role="status" aria-live="polite">Ready</span>
        </div>

        <div class="editor-shell">
          <div class="line-gutter" aria-hidden="true">
            <div class="line-gutter-inner" id="lineGutter"></div>
          </div>
          <div class="error-line-overlay" id="errorLineOverlay" hidden></div>
          <textarea id="jsonInput" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="Paste JSON"></textarea>
        </div>

        <div class="error-panel" id="errorPanel" hidden>
          <div class="error-kicker" id="errorTitle">Parse error</div>
          <div class="error-message" id="errorMessage"></div>
        </div>
      </section>

      <section class="pane" aria-labelledby="treeTitle">
        <div class="pane-head">
          <div class="pane-title" id="treeTitle">
            <span class="pulse ok" aria-hidden="true"></span>
            <span>Tree</span>
          </div>
          <div class="pane-actions">
            <button class="btn" id="expandBtn" type="button">Expand</button>
            <button class="btn" id="collapseBtn" type="button">Collapse</button>
          </div>
        </div>

        <div class="tree-shell">
          <div class="tree" id="treeView">
            <div class="empty-tree">Valid JSON renders here.</div>
          </div>
        </div>

        <div class="footer">
          <span id="rootType">Root: empty</span>
          <span><strong id="nodeCount">0</strong> nodes</span>
        </div>
      </section>
    </section>
  </main>

  <script>
    const input = document.getElementById("jsonInput");
    const lineGutter = document.getElementById("lineGutter");
    const errorLineOverlay = document.getElementById("errorLineOverlay");
    const errorPanel = document.getElementById("errorPanel");
    const errorTitle = document.getElementById("errorTitle");
    const errorMessage = document.getElementById("errorMessage");
    const statusBadge = document.getElementById("statusBadge");
    const statusPulse = document.getElementById("statusPulse");
    const treeView = document.getElementById("treeView");
    const docMeta = document.getElementById("docMeta");
    const rootType = document.getElementById("rootType");
    const nodeCount = document.getElementById("nodeCount");

    const state = {
      parsed: undefined,
      error: null,
      lineCount: 1
    };

    const sampleJson = {
      project: "neon-json-tool",
      valid: true,
      version: 1,
      colors: ["cyan", "pink", "lime"],
      metrics: {
        files: 1,
        dependencies: 0,
        formatted: null
      }
    };

    function parseJson(options = {}) {
      const selectError = options.selectError === true;
      const text = input.value;
      updateLineGutter();
      updateStats(text, undefined);

      if (text.trim() === "") {
        state.parsed = undefined;
        state.error = null;
        renderEmptyTree("Valid JSON renders here.");
        setStatus("Ready", "neutral");
        clearError();
        return { ok: false, empty: true };
      }

      try {
        const value = JSON.parse(text);
        state.parsed = value;
        state.error = null;
        renderTree(value);
        updateStats(text, value);
        setStatus("Valid", "ok");
        clearError();
        return { ok: true, value };
      } catch (error) {
        const detail = analyzeParseError(error, text);
        state.parsed = undefined;
        state.error = detail;
        renderEmptyTree("Fix JSON to refresh the tree.");
        showError(detail);
        setStatus("Invalid", "bad");
        if (selectError && detail.position !== null) {
          const end = Math.min(detail.position + 1, text.length);
          input.focus();
          input.setSelectionRange(detail.position, end);
        }
        return { ok: false, error: detail };
      }
    }

    function analyzeParseError(error, text) {
      const message = error && error.message ? error.message : "Invalid JSON";
      let position = null;
      let line = null;
      let column = null;

      const positionMatch = message.match(/position\s+(\d+)/i);
      const lineMatch = message.match(/line\s+(\d+)\s+column\s+(\d+)/i);

      if (positionMatch) {
        position = Number(positionMatch[1]);
        const loc = positionToLineColumn(text, position);
        line = loc.line;
        column = loc.column;
      } else if (lineMatch) {
        line = Number(lineMatch[1]);
        column = Number(lineMatch[2]);
        position = lineColumnToPosition(text, line, column);
      }

      return { message, position, line, column };
    }

    function positionToLineColumn(text, position) {
      const safePosition = Math.max(0, Math.min(position, text.length));
      let line = 1;
      let column = 1;

      for (let i = 0; i < safePosition; i += 1) {
        if (text.charCodeAt(i) === 10) {
          line += 1;
          column = 1;
        } else {
          column += 1;
        }
      }

      return { line, column };
    }

    function lineColumnToPosition(text, line, column) {
      let currentLine = 1;
      let currentColumn = 1;

      for (let i = 0; i < text.length; i += 1) {
        if (currentLine === line && currentColumn === column) {
          return i;
        }
        if (text.charCodeAt(i) === 10) {
          currentLine += 1;
          currentColumn = 1;
        } else {
          currentColumn += 1;
        }
      }

      return text.length;
    }

    function setStatus(label, mode) {
      statusBadge.textContent = label;
      statusBadge.classList.toggle("ok", mode === "ok");
      statusBadge.classList.toggle("bad", mode === "bad");
      statusPulse.classList.toggle("ok", mode === "ok");
      statusPulse.classList.toggle("bad", mode === "bad");
    }

    function showError(detail) {
      const location = detail.line && detail.column ? `Line ${detail.line}, column ${detail.column}` : "Syntax error";
      errorTitle.textContent = location;
      errorMessage.textContent = detail.message;
      errorPanel.hidden = false;
      updateLineGutter();
      positionErrorOverlay();
    }

    function clearError() {
      errorPanel.hidden = true;
      errorLineOverlay.hidden = true;
      updateLineGutter();
    }

    function updateStats(text, value) {
      const bytes = new Blob([text]).size;
      const lines = countLines(text);
      const nodes = value === undefined ? 0 : countNodes(value);
      state.lineCount = lines;
      docMeta.textContent = `${formatBytes(bytes)} / ${lines} ${lines === 1 ? "line" : "lines"} / ${nodes} ${nodes === 1 ? "node" : "nodes"}`;
      nodeCount.textContent = String(nodes);
      rootType.textContent = value === undefined ? "Root: empty" : `Root: ${getType(value)}`;
    }

    function countLines(text) {
      return text === "" ? 1 : text.split("\n").length;
    }

    function countNodes(value) {
      if (value === null || typeof value !== "object") {
        return 1;
      }

      const children = Array.isArray(value) ? value : Object.values(value);
      return 1 + children.reduce((total, child) => total + countNodes(child), 0);
    }

    function formatBytes(bytes) {
      if (bytes < 1024) {
        return `${bytes} ${bytes === 1 ? "byte" : "bytes"}`;
      }
      if (bytes < 1024 * 1024) {
        return `${(bytes / 1024).toFixed(1)} KB`;
      }
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function updateLineGutter() {
      const lines = countLines(input.value);
      const errorLine = state.error && state.error.line ? state.error.line : null;
      let markup = "";

      for (let i = 1; i <= lines; i += 1) {
        markup += `<span${i === errorLine ? " class=\"error\"" : ""}>${i}</span>`;
      }

      lineGutter.innerHTML = markup;
      lineGutter.style.transform = `translateY(${-input.scrollTop}px)`;
      positionErrorOverlay();
    }

    function positionErrorOverlay() {
      const detail = state.error;
      if (!detail || !detail.line) {
        errorLineOverlay.hidden = true;
        return;
      }

      const styles = window.getComputedStyle(input);
      const lineHeight = Number.parseFloat(styles.lineHeight);
      const paddingTop = Number.parseFloat(styles.paddingTop);
      const top = paddingTop + ((detail.line - 1) * lineHeight) - input.scrollTop;
      const maxTop = input.clientHeight;

      if (top + lineHeight < 0 || top > maxTop) {
        errorLineOverlay.hidden = true;
        return;
      }

      errorLineOverlay.hidden = false;
      errorLineOverlay.style.top = `${top}px`;
      errorLineOverlay.style.height = `${lineHeight}px`;
    }

    function renderTree(value) {
      treeView.replaceChildren(createTreeNode("root", value, true));
    }

    function renderEmptyTree(message) {
      const empty = document.createElement("div");
      empty.className = "empty-tree";
      empty.textContent = message;
      treeView.replaceChildren(empty);
      rootType.textContent = "Root: empty";
      nodeCount.textContent = "0";

      const text = input.value;
      if (text === "") {
        setStatus("Empty", "neutral");
        return;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          input.focus();
          input.select();
          document.execCommand("copy");
        }
        setStatus("Copied", state.error ? "bad" : "ok");
      } catch (error) {

    }
