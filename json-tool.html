<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON Tool</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,sans-serif;display:flex;flex-direction:column;min-height:100vh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #1a1a2e;flex-wrap:wrap;gap:8px}
.header h1{font-size:16px;color:#00ff88;letter-spacing:2px}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#12121a;border:1px solid #1a1a2e;color:#888;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;font-family:inherit}
.btn:hover{background:#1a1a2e;color:#ccc}
.btn.accent{background:#00ff88;color:#0a0a0f;border-color:#00ff88;font-weight:600}
.btn.accent:hover{background:#00cc6a}
.status{font-size:11px;padding:4px 8px;border-radius:4px}
.status.ok{background:#00ff8820;color:#00ff88}
.status.err{background:#ff444420;color:#ff4444}
.main{display:flex;flex:1;overflow:hidden}
.pane{flex:1;padding:12px;overflow:auto}
.pane.left{border-right:1px solid #1a1a2e}
.pane h3{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
textarea{width:100%;height:calc(100vh - 120px);background:#0d0d14;color:#ccc;border:1px solid #1a1a2e;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:13px;resize:none;outline:none;line-height:1.6;tab-size:2}
textarea:focus{border-color:#00ff8844}
.output{height:calc(100vh - 120px);background:#0d0d14;border:1px solid #1a1a2e;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:13px;overflow:auto;white-space:pre-wrap;word-break:break-all;line-height:1.6;color:#ccc}
.key{color:#00ff88}.str{color:#ffaa00}.num{color:#3399ff}.bool{color:#ff3366}.null{color:#666}.bracket{color:#888}
.tree{list-style:none;padding-left:0}
.tree li{padding-left:0}
.tree .toggle{cursor:pointer;color:#444;margin-right:4px;font-family:monospace;display:inline-block;width:16px;user-select:none}
.tree .toggle:hover{color:#888}
.tree .collapsed>.tree-children{display:none}
.tree .prop{margin:2px 0;padding:2px 4px;border-radius:4px;font-size:13px;line-height:1.5}
@media(max-width:640px){.main{flex-direction:column}.pane.left{border-right:none;border-bottom:1px solid #1a1a2e}textarea,.output{height:40vh}}
</style>
</head>
<body>
<div class="header">
<h1>JSON Tool</h1>
<div class="actions">
<button class="btn accent" id="btn-format">Format</button>
<button class="btn" id="btn-minify">Minify</button>
<button class="btn" id="btn-tree">Tree View</button>
<button class="btn" id="btn-copy">Copy</button>
<button class="btn" id="btn-clear">Clear</button>
</div>
<span class="status ok" id="status">Valid JSON</span>
</div>
<div class="main">
<div class="pane left"><h3>Input</h3><textarea id="input" placeholder="Paste JSON here..."></textarea></div>
<div class="pane"><h3>Output</h3><div class="output" id="output"></div></div>
</div>
<script>
const input = document.getElementById('input'), output = document.getElementById('output'), status = document.getElementById('status');
let lastMode = 'format';

function parseInput() { try { return JSON.parse(input.value); } catch(e) { return null; } }
function isValid() { try { JSON.parse(input.value); return true; } catch(e) { return false; } }

function highlightJSON(json, indent = 2) {
const html = JSON.stringify(json, null, indent)
.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
.replace(/("(\\u[a-f\d]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
let cls = 'num';
if (/^"/.test(m)) cls = /:$/.test(m) ? 'key' : 'str';
else if (/true|false/.test(m)) cls = 'bool';
else if (/null/.test(m)) cls = 'null';
return '<span class="' + cls + '">' + m + '</span>';
});
return html;
}

function renderTree(node, depth = 0) {
if (node === null) return '<span class="null">null</span>';
if (typeof node === 'boolean') return '<span class="bool">' + node + '</span>';
if (typeof node === 'number') return '<span class="num">' + node + '</span>';
if (typeof node === 'string') return '<span class="str">"' + node.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '"</span>';
if (Array.isArray(node)) {
if (node.length === 0) return '<span class="bracket">[]</span>';
const id = 'arr_' + depth + '_' + Math.random().toString(36).slice(2);
let html = '<div class="prop"><span class="toggle" onclick="this.parentElement.classList.toggle(\'collapsed\')">▼</span><span class="bracket">[</span> <span class="num">' + node.length + ' items</span><span class="bracket">]</span>';
html += '<div class="tree-children" style="padding-left:20px">';
node.forEach((v, i) => { html += '<div class="prop"><span class="key">' + i + '</span>: ' + renderTree(v, depth + 1) + '</div>'; });
html += '</div></div>';
return html;
}
if (typeof node === 'object') {
const keys = Object.keys(node);
if (keys.length === 0) return '<span class="bracket">{}</span>';
let html = '<div class="prop"><span class="toggle" onclick="this.parentElement.classList.toggle(\'collapsed\')">▼</span><span class="bracket">{</span> <span class="num">' + keys.length + ' keys</span><span class="bracket">}</span>';
html += '<div class="tree-children" style="padding-left:20px">';
keys.forEach(k => { html += '<div class="prop"><span class="key">"' + k.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '"</span>: ' + renderTree(node[k], depth + 1) + '</div>'; });
html += '</div></div>';
return html;
}
return String(node);
}

function format() {
const json = parseInput();
if (!json) { status.textContent = 'Invalid JSON'; status.className = 'status err'; return; }
output.innerHTML = '<pre>' + highlightJSON(json, 2) + '</pre>';
status.textContent = 'Valid JSON'; status.className = 'status ok'; lastMode = 'format';
}

function minify() {
const json = parseInput();
if (!json) { status.textContent = 'Invalid JSON'; status.className = 'status err'; return; }
output.textContent = JSON.stringify(json);
status.textContent = 'Valid JSON (minified)'; status.className = 'status ok'; lastMode = 'minify';
}

function treeView() {
const json = parseInput();
if (!json) { status.textContent = 'Invalid JSON'; status.className = 'status err'; return; }
output.innerHTML = renderTree(json);
status.textContent = 'Valid JSON (tree)'; status.className = 'status ok'; lastMode = 'tree';
}

function update() { if (!input.value.trim()) { output.innerHTML = ''; status.textContent = 'Waiting...'; status.className = 'status'; return; } if (lastMode === 'tree') treeView(); else if (lastMode === 'minify') minify(); else format(); }

document.getElementById('btn-format').addEventListener('click', format);
document.getElementById('btn-minify').addEventListener('click', minify);
document.getElementById('btn-tree').addEventListener('click', treeView);
document.getElementById('btn-copy').addEventListener('click', () => { const text = output.textContent || output.innerText; navigator.clipboard.writeText(text).then(() => { status.textContent = 'Copied!'; status.className = 'status ok'; setTimeout(() => update(), 1500); }); });
document.getElementById('btn-clear').addEventListener('click', () => { input.value = ''; output.innerHTML = ''; status.textContent = 'Waiting...'; status.className = 'status'; });
input.addEventListener('input', update);
input.addEventListener('paste', () => setTimeout(update, 50));
input.addEventListener('drop', e => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (!file) return; const r = new FileReader(); r.onload = () => { input.value = r.result; update(); }; r.readAsText(file); });

window.addEventListener('load', () => {
input.value = JSON.stringify({ name: "demo", items: [1, 2, 3], nested: { flag: true, value: null } }, null, 2);
format();
});
</script>
</body>
</html>
