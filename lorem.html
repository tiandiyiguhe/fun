<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lorem Ipsum Generator</title>
<style>
*{box-sizing:border-box}
:root{
  color-scheme:dark;
  --bg:#06070d;
  --panel:#0d1020;
  --panel-2:#11162b;
  --line:#24304d;
  --text:#e8f7ff;
  --muted:#7e91ad;
  --cyan:#22e6ff;
  --pink:#ff3df2;
  --lime:#93ff5c;
  --amber:#ffd166;
  --shadow:0 18px 60px rgba(0,0,0,.45);
}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{
  min-height:100vh;
  padding:24px;
  display:grid;
  place-items:center;
  background:
    linear-gradient(135deg,rgba(34,230,255,.11),transparent 34%),
    linear-gradient(315deg,rgba(255,61,242,.09),transparent 38%),
    repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 64px),
    repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 64px),
    #06070d;
}
button,input,textarea{font:inherit}
button{cursor:pointer}
.shell{width:min(1120px,100%);display:grid;grid-template-columns:330px minmax(0,1fr);gap:18px;align-items:stretch}
.controls,.output-wrap{
  background:linear-gradient(180deg,rgba(17,22,43,.96),rgba(8,10,20,.98));
  border:1px solid rgba(34,230,255,.22);
  border-radius:8px;
  box-shadow:var(--shadow),0 0 40px rgba(34,230,255,.08);
}
.controls{padding:22px;display:flex;flex-direction:column;gap:18px}
.brand{display:flex;align-items:center;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding-bottom:16px}
h1{margin:0;font-size:24px;line-height:1.05;letter-spacing:0;font-weight:800;color:#fff;text-shadow:0 0 18px rgba(34,230,255,.48)}
.pulse{width:12px;height:12px;border-radius:50%;background:var(--lime);box-shadow:0 0 14px var(--lime),0 0 30px rgba(147,255,92,.5);flex:none}
.field{display:flex;flex-direction:column;gap:10px}
.label-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
label,.caption{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.value-chip{min-width:54px;text-align:center;color:var(--lime);border:1px solid rgba(147,255,92,.35);background:rgba(147,255,92,.08);border-radius:999px;padding:4px 8px;font:700 13px/1.1 "SFMono-Regular",Consolas,"Liberation Mono",monospace}
.mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mode-grid input{position:absolute;opacity:0;pointer-events:none}
.mode-grid span{
  min-height:44px;
  display:grid;
  place-items:center;
  padding:8px 6px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#090c19;
  color:#9dafc9;
  font-size:13px;
  font-weight:750;
  transition:background .18s,border-color .18s,color .18s,box-shadow .18s;
}
.mode-grid label:has(input:checked) span{
  color:#071018;
  border-color:var(--cyan);
  background:linear-gradient(135deg,var(--cyan),var(--lime));
  box-shadow:0 0 22px rgba(34,230,255,.26);
}
.mode-grid label:focus-within span,.action:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--pink);outline-offset:3px}
.count-row{display:grid;grid-template-columns:minmax(0,1fr) 74px;gap:12px;align-items:center}
input[type=range]{width:100%;height:6px;border-radius:999px;appearance:none;background:linear-gradient(90deg,var(--cyan),var(--pink));outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;border:2px solid #071018;background:var(--amber);box-shadow:0 0 18px rgba(255,209,102,.7)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;border:2px solid #071018;background:var(--amber);box-shadow:0 0 18px rgba(255,209,102,.7)}
input[type=number]{
  width:100%;
  border:1px solid var(--line);
  border-radius:8px;
  background:#080b17;
  color:var(--text);
  padding:11px 10px;
  text-align:center;
  font-weight:800;
}
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.quick button,.action{
  border:1px solid var(--line);
  border-radius:8px;
  background:#090c19;
  color:#b8c8dc;
  min-height:42px;
  padding:10px 12px;
  transition:transform .16s,background .16s,border-color .16s,color .16s,box-shadow .16s;
}
.quick button:hover,.action:hover{transform:translateY(-1px);border-color:rgba(34,230,255,.55);color:#fff;box-shadow:0 0 18px rgba(34,230,255,.12)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}
.action.primary{background:linear-gradient(135deg,var(--pink),var(--cyan));border-color:transparent;color:#070a12;font-weight:850}
.action.copying{border-color:var(--lime);color:var(--lime)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{border:1px solid var(--line);border-radius:8px;background:#080b17;padding:12px}
.stat strong{display:block;color:var(--cyan);font-size:22px;line-height:1;font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
.stat span{display:block;margin-top:6px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.output-wrap{min-height:640px;display:flex;flex-direction:column;overflow:hidden}
.output-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line);background:rgba(6,7,13,.45)}
.output-title{font-size:13px;color:var(--amber);text-transform:uppercase;letter-spacing:1.4px;font-weight:800}
.word-pill{color:var(--cyan);font:800 13px/1 "SFMono-Regular",Consolas,"Liberation Mono",monospace;border:1px solid rgba(34,230,255,.32);border-radius:999px;padding:8px 10px;background:rgba(34,230,255,.07);white-space:nowrap}
#output{
  flex:1;
  width:100%;
  min-height:520px;
  resize:none;
  border:0;
  border-radius:0;
  outline:0;
  background:transparent;
  color:#eaf8ff;
  padding:24px;
  font:16px/1.75 Georgia,"Times New Roman",serif;
  letter-spacing:0;
  caret-color:var(--cyan);
}
#output::selection{background:rgba(255,61,242,.35)}
@media (max-width:820px){
  body{padding:14px;place-items:start center}
  .shell{grid-template-columns:1fr}
  .controls{padding:18px}
  .output-wrap{min-height:430px}
  #output{min-height:340px;padding:18px;font-size:15px}
}
@media (max-width:480px){
  h1{font-size:20px}
  .mode-grid,.quick,.actions,.stats{grid-template-columns:1fr}
  .count-row{grid-template-columns:1fr}
  .output-head{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<main class="shell">
  <section class="controls" aria-label="Generator controls">
    <div class="brand">
      <h1>Lorem Ipsum</h1>
      <div class="pulse" aria-hidden="true"></div>
    </div>

    <div class="field">
      <div class="label-row">
        <span class="caption">Mode</span>
        <span class="value-chip" id="mode-label">Paragraphs</span>
      </div>
      <div class="mode-grid" role="radiogroup" aria-label="Generation mode">
        <label><input type="radio" name="mode" id="mode-paragraphs" value="paragraphs" checked><span>Paragraphs</span></label>
        <label><input type="radio" name="mode" id="mode-sentences" value="sentences"><span>Sentences</span></label>
        <label><input type="radio" name="mode" id="mode-words" value="words"><span>Words</span></label>
      </div>
    </div>

    <div class="field">
      <div class="label-row">
        <label for="count" id="count-label">Paragraph count</label>
        <span class="value-chip" id="count-value">3</span>
      </div>
      <div class="count-row">
        <input type="range" id="count-range" min="1" max="12" value="3" aria-labelledby="count-label">
        <input type="number" id="count" min="1" max="12" value="3" aria-labelledby="count-label">
      </div>
    </div>

    <div class="field">
      <span class="caption">Quick count</span>
      <div class="quick" id="quick-counts">
        <button type="button" data-count="1">1</button>
        <button type="button" data-count="3">3</button>
        <button type="button" data-count="5">5</button>
        <button type="button" data-count="8">8</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><strong id="unit-count">3</strong><span id="unit-label">Paragraphs</span></div>
      <div class="stat"><strong id="word-count">0</strong><span>Words</span></div>
    </div>

    <div class="actions">
      <button type="button" class="action primary" id="generate">Generate</button>
      <button type="button" class="action" id="copy">Copy</button>
    </div>
  </section>

  <section class="output-wrap" aria-label="Generated text">
    <div class="output-head">
      <div class="output-title">Output</div>
      <div class="word-pill"><span id="word-count-inline">0</span> words</div>
    </div>
    <textarea id="output" spellcheck="false" aria-label="Generated lorem ipsum text">Lorem ipsum dolor sit amet.</textarea>
  </section>
</main>

<script>
const words = [
  'lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua',
  'enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure',
  'reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa',
  'officia','deserunt','mollit','anim','id','est','laborum','phasellus','neque','fermentum','porta','nunc','viverra','mauris','integer','rhoncus','sapien',
  'praesent','gravida','lectus','ultricies','turpis','curabitur','vitae','ligula','auctor','metus','facilisis','varius','nibh','sollicitudin','taciti'
];

const settings = {
  paragraphs: { label: 'Paragraphs', countLabel: 'Paragraph count', min: 1, max: 12, value: 3, quick: [1, 3, 5, 8] },
  sentences: { label: 'Sentences', countLabel: 'Sentence count', min: 1, max: 80, value: 8, quick: [3, 8, 16, 32] },
  words: { label: 'Words', countLabel: 'Word count', min: 5, max: 500, value: 120, quick: [25, 50, 120, 250] }
};

const el = {
  output: document.getElementById('output'),
  modes: [...document.querySelectorAll('input[name="mode"]')],
  modeLabel: document.getElementById('mode-label'),
  countLabel: document.getElementById('count-label'),
  countRange: document.getElementById('count-range'),
  count: document.getElementById('count'),
  countValue: document.getElementById('count-value'),
  quickCounts: document.getElementById('quick-counts'),
  unitCount: document.getElementById('unit-count'),
  unitLabel: document.getElementById('unit-label'),
  wordCount: document.getElementById('word-count'),
  wordCountInline: document.getElementById('word-count-inline'),
  generate: document.getElementById('generate'),
  copy: document.getElementById('copy')
};

function currentMode() {
  return el.modes.find(mode => mode.checked).value;
}

function clamp(value, min, max) {
  const number = Number.parseInt(value, 10);
  if (Number.isNaN(number)) return min;
  return Math.min(max, Math.max(min, number));
}

function capitalize(word) {
  return word.charAt(0).toUpperCase() + word.slice(1);
}

function wordAt(index) {
  return words[index % words.length];
}

function countWords(text) {
  const matches = text.trim().match(/[A-Za-z]+(?:'[A-Za-z]+)?/g);
  return matches ? matches.length : 0;
}

function makeWordList(count, startWithLorem) {
  const list = [];
  let index = 0;
  if (startWithLorem && count > 0) list.push('lorem');
  if (startWithLorem && count > 1) list.push('ipsum');
  while (list.length < count) {
    list.push(wordAt(index + list.length));
    index += 3;
  }
  return list.slice(0, count);
}

function sentenceFromWords(count, startWithLorem, offset) {
  const list = startWithLorem ? makeWordList(count, true) : Array.from({ length: count }, (_, index) => wordAt(index + offset));
  if (!list.length) return '';
  list[0] = capitalize(list[0]);
  return list.join(' ') + '.';
}

function generateWords(count) {
  const list = makeWordList(count, true);
  if (!list.length) return '';
  list[0] = capitalize(list[0]);
  return list.join(' ') + '.';
}

function generateSentences(count) {
  const sentences = [];
  for (let i = 0; i < count; i++) {
    const length = i === 0 ? 11 : 8 + ((i * 5) % 12);
    sentences.push(sentenceFromWords(length, i === 0, i * 11));
  }
  return sentences.join(' ');
}

function generateParagraphs(count) {
  const paragraphs = [];
  for (let i = 0; i < count; i++) {
    const sentenceCount = 3 + (i % 3);
    const paragraph = [];
    for (let j = 0; j < sentenceCount; j++) {
      const length = i === 0 && j === 0 ? 11 : 9 + ((i + j * 4) % 11);
      paragraph.push(sentenceFromWords(length, i === 0 && j === 0, (i * 17) + (j * 13)));
    }
    paragraphs.push(paragraph.join(' '));
  }
  return paragraphs.join('\n\n');
}

function generateLorem(mode, count) {
  if (mode === 'words') return generateWords(count);
  if (mode === 'sentences') return generateSentences(count);
  return generateParagraphs(count);
}

function updateStats(mode, count, text) {
  const totalWords = countWords(text);
  el.unitCount.textContent = String(count);
  el.unitLabel.textContent = settings[mode].label;
  el.wordCount.textContent = String(totalWords);
  el.wordCountInline.textContent = String(totalWords);
}

function renderQuickCounts(mode) {
  el.quickCounts.innerHTML = settings[mode].quick.map(value => `<button type="button" data-count="${value}">${value}</button>`).join('');
}

function syncCount(value) {
  const mode = currentMode();
  const config = settings[mode];
  const count = clamp(value, config.min, config.max);
  config.value = count;
  el.count.value = count;
  el.countRange.value = count;
  el.countValue.textContent = String(count);
  generate();
}

function applyMode(mode) {
  const config = settings[mode];
  el.modeLabel.textContent = config.label;
  el.countLabel.textContent = config.countLabel;
  el.count.min = config.min;
  el.count.max = config.max;
  el.countRange.min = config.min;
  el.countRange.max = config.max;
  renderQuickCounts(mode);
  syncCount(config.value);
}

function generate() {
  const mode = currentMode();
  const count = clamp(el.count.value, settings[mode].min, settings[mode].max);
  const text = generateLorem(mode, count);
  el.output.value = text;
  updateStats(mode, count, text);
}

async function copyOutput() {
  el.output.select();
  const text = el.output.value;
  try {
    await navigator.clipboard.writeText(text);
  } catch (error) {
    document.execCommand('copy');
  }
  el.copy.textContent = 'Copied';
  el.copy.classList.add('copying');
  window.setTimeout(() => {
    el.copy.textContent = 'Copy';
    el.copy.classList.remove('copying');
  }, 1200);
}

el.modes.forEach(mode => mode.addEventListener('change', event => applyMode(event.target.value)));
el.count.addEventListener('input', event => syncCount(event.target.value));
el.countRange.addEventListener('input', event => syncCount(event.target.value));
el.quickCounts.addEventListener('click', event => {
  const button = event.target.closest('button[data-count]');
  if (button) syncCount(button.dataset.count);
});
el.generate.addEventListener('click', generate);
el.copy.addEventListener('click', copyOutput);
el.output.addEventListener('input', () => updateStats(currentMode(), clamp(el.count.value, settings[currentMode()].min, settings[currentMode()].max), el.output.value));

applyMode('paragraphs');
</script>
</body>
</html>
