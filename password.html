<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.container{display:flex;flex-direction:column;gap:20px;width:100%;max-width:440px;align-items:center}
.title{font-size:24px;font-weight:700;color:#00ff88;letter-spacing:2px}
.output-area{width:100%;display:flex;gap:8px}
.output{flex:1;background:#0d0d14;border:2px solid #1a1a2e;border-radius:10px;padding:16px;font-family:'Courier New',monospace;font-size:20px;color:#00ff88;word-break:break-all;text-align:center;min-height:54px;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.output:focus{border-color:#00ff8844}
.copy-btn{background:#00ff88;border:none;color:#0a0a0f;padding:0 16px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;min-width:60px;font-family:inherit}
.copy-btn:hover{background:#00cc6a}
.strength{width:100%;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden}
.strength-bar{height:100%;border-radius:2px;transition:all .3s;width:0}
.options{width:100%;display:flex;flex-direction:column;gap:10px}
.row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.row label{font-size:13px;color:#888}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:#1a1a2e;border-radius:2px;outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00ff88;cursor:pointer}
.slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:#00ff88;cursor:pointer;border:none}
.slider-value{font-family:'Courier New',monospace;color:#00ff88;font-size:14px;min-width:30px;text-align:right}
.toggle{position:relative;display:inline-block;width:40px;height:22px}
.toggle input{opacity:0;width:0;height:0}
.toggle .track{position:absolute;top:0;left:0;right:0;bottom:0;background:#1a1a2e;border-radius:11px;cursor:pointer;transition:all .2s}
.toggle .track:before{content:'';position:absolute;width:18px;height:18px;left:2px;bottom:2px;background:#444;border-radius:50%;transition:all .2s}
.toggle input:checked+.track{background:#00ff8820}
.toggle input:checked+.track:before{transform:translateX(18px);background:#00ff88}
.btn-row{display:flex;gap:8px;width:100%}
.btn{background:#12121a;border:1px solid #1a1a2e;color:#888;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit;flex:1}
.btn:hover{background:#1a1a2e;color:#ccc}
.btn.primary{background:#00ff88;color:#0a0a0f;border-color:#00ff88;font-weight:600}
.btn.primary:hover{background:#00cc6a}
.entropy{font-size:11px;color:#444;text-align:center}
</style>
</head>
<body>
<div class="container">
<div class="title">Password Generator</div>
<div class="output-area">
<div class="output" id="output" contenteditable="false"></div>
<button class="copy-btn" id="btn-copy">Copy</button>
</div>
<div class="strength"><div class="strength-bar" id="strength"></div></div>
<div class="options">
<div class="row"><label>Length</label><input class="slider" type="range" id="len" min="8" max="64" value="16"><span class="slider-value" id="len-val">16</span></div>
<div class="row"><label>Uppercase (A-Z)</label><label class="toggle"><input type="checkbox" id="upper" checked><span class="track"></span></label></div>
<div class="row"><label>Lowercase (a-z)</label><label class="toggle"><input type="checkbox" id="lower" checked><span class="track"></span></label></div>
<div class="row"><label>Numbers (0-9)</label><label class="toggle"><input type="checkbox" id="numbers" checked><span class="track"></span></label></div>
<div class="row"><label>Symbols (!@#$...)</label><label class="toggle"><input type="checkbox" id="symbols"><span class="track"></span></label></div>
</div>
<div class="entropy" id="entropy"></div>
<div class="btn-row">
<button class="btn primary" id="btn-gen">Generate</button>
<button class="btn" id="btn-passphrase">Passphrase</button>
</div>
</div>
<script>
const el = {
output: document.getElementById('output'), strength: document.getElementById('strength'),
len: document.getElementById('len'), lenVal: document.getElementById('len-val'),
upper: document.getElementById('upper'), lower: document.getElementById('lower'),
numbers: document.getElementById('numbers'), symbols: document.getElementById('symbols'),
entropy: document.getElementById('entropy')
};
const wordList = ['neon','cyber','pixel','ghost','crystal','quantum','void','flare','shadow','nova','pulse','drift','spark','orbit','photon','binary','cosmic','echo','glitch','warp','zenith','matrix','prism','aurora','vortex','solar','lunar','comet','fusion','ember'];

function getCharset() {
let c = '';
if (el.upper.checked) c += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
if (el.lower.checked) c += 'abcdefghijklmnopqrstuvwxyz';
if (el.numbers.checked) c += '0123456789';
if (el.symbols.checked) c += '!@#$%^&*()_+-=[]{}|;:,.<>?';
return c;
}

function cryptoRandom(max) {
const arr = new Uint32Array(1);
crypto.getRandomValues(arr);
return arr[0] % max;
}

function generate() {
const charset = getCharset();
if (!charset) { el.output.textContent = 'Select at least one set'; return; }
const len = parseInt(el.len.value);
let pw = '';
for (let i = 0; i < len; i++) pw += charset[cryptoRandom(charset.length)];
el.output.textContent = pw;
updateStrength(pw);
}

function generatePassphrase() {
const words = [];
const len = parseInt(el.len.value);
const count = Math.max(3, Math.floor(len / 6));
for (let i = 0; i < count; i++) {
let w = wordList[cryptoRandom(wordList.length)];
if (Math.random() > 0.5 && el.upper.checked) w = w.charAt(0).toUpperCase() + w.slice(1);
words.push(w);
}
let sep = '-';
if (el.symbols.checked && Math.random() > 0.5) sep = ['-','_','.','!'][cryptoRandom(4)];
let pw = words.join(sep);
if (el.numbers.checked) pw += cryptoRandom(100);
el.output.textContent = pw;
updateStrength(pw);
}

function updateStrength(pw) {
if (!pw) { el.strength.style.width = '0%'; el.entropy.textContent = ''; return; }
const charset = getCharset();
const pool = charset.length || 26;
const bits = Math.log2(Math.pow(pool, pw.length));
const pct = Math.min(100, (bits / 128) * 100);
el.strength.style.width = pct + '%';
if (pct < 33) el.strength.style.background = '#ff3366';
else if (pct < 66) el.strength.style.background = '#ffaa00';
else el.strength.style.background = '#00ff88';
el.entropy.textContent = '~' + Math.round(bits) + ' bits entropy';
}

el.len.addEventListener('input', () => { el.lenVal.textContent = el.len.value; });
[el.upper, el.lower, el.numbers, el.symbols].forEach(el => el.addEventListener('change', () => { if (!getCharset()) { if (el.upper) el.upper.checked = true; if (el.lower && !el.upper.checked) el.lower.checked = true; } }));
document.getElementById('btn-gen').addEventListener('click', generate);
document.getElementById('btn-passphrase').addEventListener('click', generatePassphrase);
document.getElementById('btn-copy').addEventListener('click', () => navigator.clipboard.writeText(el.output.textContent));
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); generate(); } });

window.addEventListener('load', generate);
</script>
</body>
</html>
